// CAMBIO #2: calcReba con tablas reales + NaN-safe
function calcReba(s) {
  const n = (v,d) => { const x=Number(v); return isNaN(x)?d:x; };
  const b = v => !!v;
  const trunkFin = Math.min(Math.max(n(s.trunk,1),1) + (b(s.trunkT)?1:0) + (b(s.trunkS)?1:0), 5);
  const neckFin  = Math.min(Math.max(n(s.neck,1),1)  + (b(s.neckT)?1:0)  + (b(s.neckS)?1:0), 3);
  const legsFin  = Math.min(Math.max(n(s.legs,1),1), 4);
  const scoreTA  = REBA_TABLE_A[trunkFin-1]?.[neckFin-1]?.[legsFin-1] ?? 9;
  const sA = Math.min(scoreTA + Math.min(Math.max(n(s.load,0),0),2) + (b(s.shock)?1:0), 12);
  const uaFin    = Math.min(Math.max(Math.max(n(s.ua,1),1) + (b(s.shr)?1:0) + (b(s.abd)?1:0) - (b(s.sup)?1:0), 1), 6);
  const laFin    = Math.min(Math.max(n(s.la,1),1), 2);
  const wristFin = Math.min(Math.max(n(s.wrist,1),1) + (b(s.wristT)?1:0), 3);
  const scoreTB  = REBA_TABLE_B[uaFin-1]?.[laFin-1]?.[wristFin-1] ?? 9;
  const sB = Math.min(scoreTB + Math.min(Math.max(n(s.coup,0),0),3), 12);
  const sC = REBA_TC[Math.min(sA-1,11)]?.[Math.min(sB-1,11)] ?? 12;
  const fin = Math.min(sC + Math.min(Math.max(n(s.act,0),0),3), 15);
  const level = fin<=1?0:fin<=3?1:fin<=7?2:fin<=10?3:4;
  return {sA,sB,sC,fin,level};
}

// CAMBIO #3: calcRula NaN-safe (tablas originales estaban bien)
const RULA_TA = [
  [[[1,2],[2,2],[2,3],[3,3]],[[2,2],[2,2],[3,3],[3,3]],[[2,3],[3,3],[3,3],[4,4]]],
  [[[2,3],[3,3],[3,4],[4,4]],[[3,3],[3,3],[3,4],[4,4]],[[3,4],[4,4],[4,4],[5,5]]],
  [[[3,3],[4,4],[4,4],[5,5]],[[3,4],[4,4],[4,5],[5,5]],[[4,4],[4,4],[4,5],[5,6]]],
  [[[4,4],[4,4],[4,5],[5,5]],[[4,4],[4,4],[4,5],[5,5]],[[4,5],[5,5],[5,6],[6,7]]],
  [[[5,5],[5,5],[5,6],[6,7]],[[5,6],[6,6],[6,7],[7,7]],[[6,6],[6,7],[7,7],[7,8]]],
  [[[7,8],[7,8],[7,8],[8,9]],[[8,9],[8,9],[8,9],[9,9]],[[9,9],[9,9],[9,9],[9,9]]]
];
function calcRula(s) {
  const n = (v,d) => { const x=Number(v); return isNaN(x)?d:x; };
  const b = v => !!v;
  const ua = Math.min(Math.max(n(s.ua,1),1) + (b(s.shr)?1:0) - (b(s.sup)?1:0), 6);
  const la = Math.min(Math.max(n(s.la,1),1) + (b(s.mid)?1:0), 3);
  const w  = Math.min(Math.max(n(s.wrist,1),1), 3);
  const wt = b(s.wristT) ? 1 : 0;
  const sA = (RULA_TA[Math.max(ua-1,0)]?.[Math.max(la-1,0)]?.[Math.max(w-1,0)]?.[wt] ?? 9)
             + Math.min(Math.max(n(s.mA,0),0),1) + Math.min(Math.max(n(s.fA,0),0),3);
  const tB = [
    [1,3,2,3,3,4,5,5,6,6,7,7],[2,3,2,3,4,5,5,6,6,7,7,7],
    [3,4,3,4,4,5,6,6,7,7,7,7],[5,5,4,5,5,6,7,7,7,7,8,8],
    [7,7,5,6,6,7,7,8,8,8,8,8],[8,8,7,7,7,8,8,9,9,9,9,9]
  ];
  const nk = Math.min(Math.max(n(s.neck,1),1) + (b(s.neckT)?1:0) + (b(s.neckS)?1:0), 6);
  const tr = Math.min(Math.max(n(s.trunk,1),1) + (b(s.trunkT)?1:0) + (b(s.trunkS)?1:0), 6);
  const lg = Math.min(Math.max(n(s.legs,1),1), 2);
  const sB = (tB[nk-1]?.[tr + (lg-1)*6 - 1] ?? 9)
             + Math.min(Math.max(n(s.mB,0),0),1) + Math.min(Math.max(n(s.fB,0),0),3);
  const tC = [
    [1,2,3,3,4,5,5],[2,2,3,4,4,5,5],[3,3,3,4,4,5,6],[3,3,3,4,5,6,6],
    [4,4,4,5,6,7,7],[4,4,5,6,6,7,7],[5,5,6,6,7,7,7],[5,5,6,7,7,7,7]
  ];
  const fin = tC[Math.min(Math.max(sA-1,0),7)]?.[Math.min(Math.max(sB-1,0),6)] ?? 7;
  const level = fin<=2?0:fin<=3?1:fin<=4?2:fin<=6?3:4;
  return {sA,sB,fin,level};
}

// CAMBIO #4: NIOSH con F=0 manejado
const NIOSH_FM = {
  "<1h": [0.85,0.81,0.75,0.65,0.55,0.45,0,0,0,0,0,0,0],
  "1-2h":[0.95,0.92,0.88,0.84,0.79,0.72,0.6,0.5,0.42,0.35,0.3,0.26,0.23],
  "2-8h":[1,0.97,0.94,0.91,0.88,0.84,0.8,0.75,0.7,0.6,0.52,0.45,0]
};
function calcNiosh(s) {
  const HM = Math.min(25 / Math.max(s.H, 1), 1);
  const VM = Math.max(1 - 0.003 * Math.abs(s.V - 75), 0);
  const DM = s.D < 25 ? 0.87 : Math.min(0.82 + 4.5/s.D, 1);
  const AM = Math.max(1 - 0.0032 * s.A, 0);
  const fi = s.F<=0.2?0:s.F<=0.5?1:s.F<=1?2:s.F<=2?3:s.F<=3?4:
             s.F<=4?5:s.F<=5?6:s.F<=6?7:s.F<=7?8:s.F<=8?9:s.F<=9?10:s.F<=10?11:12;
  const FM = NIOSH_FM[s.dur]?.[fi] ?? 0.45;
  const CM = s.coup==="good" ? 1 : s.coup==="fair" ? 0.95 : 0.90;
  const RWL = 23 * HM * VM * DM * AM * FM * CM;
  const LI  = RWL > 0.01 ? s.L / RWL : (s.L > 0 ? 999 : 0);
  const level = LI<=1?0 : LI<=1.5?1 : LI<=2?2 : LI<=3?3 : 4;
  return {HM, VM, DM, AM, FM, CM, RWL:RWL.toFixed(2), LI:LI.toFixed(2), level};
}

// ── MMC (ORIGINAL SIN CAMBIOS) ───────────────────────────────────────────
function calcMMC(s, sexo) {
  const sx  = sexo === "femenino" ? "femenino" : "masculino";
  const rm  = NORMA.rm375[sx];
  const row = NORMA.iso.find(x => x.g === s.grupo)
           || (sx === "masculino" ? NORMA.iso[0] : NORMA.iso[3]);
  const isoLim = s.frec==="ocasional" ? row.o : s.frec==="frecuente" ? row.f : row.mf;
  const limAp = rm.general;
  const exc   = Math.max(s.peso - limAp, 0);
  const pct   = limAp > 0 ? ((s.peso / limAp - 1) * 100) : 0;
  let level   = s.peso<=limAp?0 : s.peso<=limAp*1.2?1 : s.peso<=limAp*1.5?2 : s.peso<=limAp*2?3 : 4;
  const nF    = (s.factores||[]).length;
  if (nF >= 3 && level < 2) level = 2;
  if (nF >= 5 && level < 3) level = 3;
  return {
    limRM: rm.general, limEnt: rm.entrenado, limISO: isoLim, limAp,
    exc: exc.toFixed(1), pct: pct.toFixed(0), nF, level,
    cumRM:  s.peso <= rm.general,
    cumISO: s.peso <= isoLim
  };
}

  {id:"freq", l:"Alta frecuencia >4/min o >2h"},
  {id:"dist", l:"Distancia horizontal >50cm"},
  {id:"alt",  l:"Encima hombros o bajo rodillas"},
  {id:"asim", l:"Torsión de tronco al levantar"},
  {id:"agr",  l:"Agarre deficiente (sin asas)"},
  {id:"esp",  l:"Espacio de trabajo restringido"},
  {id:"ines", l:"Carga inestable"},
  {id:"sue",  l:"Superficie inestable"},
  {id:"eq",   l:"Sin ayudas mecánicas"},
];

// ── PANELES EVALUACIÓN (ORIGINAL SIN CAMBIOS) ────────────────────────────
function REBAPanel({s, set}) {
  const r = calcReba(s);
  const u = (k,v) => set(p => ({...p,[k]:v}));
  return (
    <Card title="REBA — Rapid Entire Body Assessment">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <Sec title="Cuello"/>
          <Sel label="Posición" val={s.neck} onChange={v=>u("neck",v)}
            opts={[[1,"1·0-20°"],[2,"2·>20° o ext"]]}/>
          <Chk label="Torsión"            val={s.neckT}  onChange={v=>u("neckT",v)}/>
          <Chk label="Inclinación lateral" val={s.neckS}  onChange={v=>u("neckS",v)}/>
          <Sec title="Tronco"/>
          <Sel label="Posición" val={s.trunk} onChange={v=>u("trunk",v)}
            opts={[[1,"1·Erecto"],[2,"2·0-20°"],[3,"3·20-60°"],[4,"4·>60°"]]}/>
          <Chk label="Torsión"    val={s.trunkT} onChange={v=>u("trunkT",v)}/>
          <Chk label="Inclinación" val={s.trunkS} onChange={v=>u("trunkS",v)}/>
          <Sec title="Piernas"/>
          <Sel label="Posición" val={s.legs} onChange={v=>u("legs",v)}
            opts={[[1,"1·Bilateral"],[2,"2·Unilateral"],[3,"3·Flex 30-60°"],[4,"4·Flex >60°"]]}/>
          <Sec title="Carga"/>
          <Sel label="Peso" val={s.load} onChange={v=>u("load",v)}
            opts={[[0,"0·<5kg"],[1,"1·5-10kg"],[2,"2·>10kg"]]}/>
          <Chk label="+1 Fuerza brusca" val={s.shock} onChange={v=>u("shock",v)}/>
        </div>
        <div>
          <Sec title="Brazo Superior"/>
          <Sel label="Posición" val={s.ua} onChange={v=>u("ua",v)}
            opts={[[1,"1·-20/20°"],[2,"2·20-45°"],[3,"3·45-90°"],[4,"4·>90°"]]}/>
          <Chk label="Hombro elevado"   val={s.shr} onChange={v=>u("shr",v)}/>
          <Chk label="Abducido"          val={s.abd} onChange={v=>u("abd",v)}/>
          <Chk label="Apoyado (resta 1)" val={s.sup} onChange={v=>u("sup",v)}/>
          <Sec title="Brazo Inferior"/>
          <Sel label="Posición" val={s.la} onChange={v=>u("la",v)}
            opts={[[1,"1·60-100°"],[2,"2·Fuera rango"]]}/>
          <Sec title="Muñeca"/>
          <Sel label="Posición" val={s.wrist} onChange={v=>u("wrist",v)}
            opts={[[1,"1·0-15°"],[2,"2·>15°"]]}/>
          <Chk label="Torsión" val={s.wristT} onChange={v=>u("wristT",v)}/>
          <Sec title="Modificadores"/>
          <Sel label="Acoplamiento" val={s.coup} onChange={v=>u("coup",v)}
            opts={[[0,"0·Bueno"],[1,"1·Regular"],[2,"2·Malo"],[3,"3·Inaceptable"]]}/>
          <Sel label="Actividad" val={s.act} onChange={v=>u("act",v)}
            opts={[[0,"0·Normal"],[1,"1·Estático"],[2,"2·Repetitivo"],[3,"3·Cambios rápidos"]]}/>
        </div>
      </div>
      <Badge level={r.level} text={`Score ${r.fin}/15`}/>
      <div style={{fontSize:12,color:C.muted,marginTop:4}}>A:{r.sA} · B:{r.sB} · C:{r.sC}</div>
    </Card>
  );
}

          <Sel label="Espalda" val={s.back} onChange={v=>set(p=>({...p,back:v}))}

            opts={[[1,"1·Bajo hombros"],[2,"2·Uno sobre"],[3,"3·Ambos sobre"]]}/>

          <Sel label="Piernas" val={s.legs} onChange={v=>set(p=>({...p,legs:v}))}

                   [5,"5·Una rodilla"],[6,"6·Arrodillado"],[7,"7·Caminando"]]}/>

  const tF = id => set(p => ({
    ...p,
    factores: p.factores.includes(id)
      ? p.factores.filter(x => x!==id)
      : [...p.factores, id]
  }));
  return (
    <Card title="⚖️ MMC — Manejo Manual de Cargas" ac={C.orange}>
      <div style={{background:"#FFF3E8",border:`1px solid ${C.orange}44`,borderRadius:8,
        padding:"10px 14px",marginBottom:12,fontSize:12}}>
        <strong style={{color:C.orange}}>Normativa:</strong> RM N° 375-2008-TR · ISO 11228-1
        <span style={{marginLeft:10,color:C.mid}}>
          Límite {sexo==="femenino"?"mujer":"varón"}: <strong>{r.limRM}kg</strong> (RM 375) ·
          Límite {s.frec}: <strong>{r.limISO}kg</strong> (ISO 11228)
        </span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <Num label="Peso real de la carga [kg]" val={s.peso} onChange={v=>u("peso",v)} min={0} max={300}/>
          <Sel label="Grupo del trabajador" val={s.grupo} onChange={v=>u("grupo",v)}
            opts={NORMA.iso.map(x => [x.g, x.g])}/>
          <Sel label="Frecuencia de exposición" val={s.frec} onChange={v=>u("frec",v)}
            opts={[["ocasional","Ocasional (<1/5min)"],
                   ["frecuente","Frecuente (1-4/min)"],
                   ["muyFrecuente","Muy frecuente (>4/min)"]]}/>
          <Sel label="Capacitación MMC" val={s.form} onChange={v=>u("form",v)}
            opts={[["no","No — sin capacitación"],["si","Sí — capacitado"]]}/>
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:C.orange,marginBottom:6,textTransform:"uppercase"}}>

            </span>
            <span style={{background:r.cumISO?"#dcfce7":"#fee2e2",
              color:r.cumISO?"#166534":"#991b1b",
              padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:12}}>

// ── PARSER IA (ORIGINAL SIN CAMBIOS) ─────────────────────────────────────
function parseIA(txt, m) {
  const num = (pat, maxVal) => {
    const line = txt.split("\n").find(l => pat.test(l));
    if (!line) return null;
    const mt = line.match(/\[(\d)\]/);
    if (!mt) return null;
    const v = parseInt(mt[1]);
    return maxVal ? Math.min(v, maxVal) : v;
  };
  const bool = pat => {
    const line = txt.split("\n").find(l => pat.test(l));
    if (!line) return null;
    if (/sí|si/i.test(line)) return true;
    if (/\bno\b/i.test(line)) return false;
    return null;
  };
  const vals = {};
  if (m === "REBA") {
    const neck  = num(/CUELLO/i,    2); if (neck  !== null) vals.neck  = neck;
    const trunk = num(/TRONCO/i,    4); if (trunk !== null) vals.trunk = trunk;
    const legs  = num(/PIERNAS/i,   4); if (legs  !== null) vals.legs  = legs;
    const ua    = num(/BRAZO SUPERIOR/i, 4); if (ua !== null) vals.ua = ua;
    const la    = num(/BRAZO INFERIOR/i, 2); if (la !== null) vals.la = la;
    const wrist = num(/MUÑECA|MU.ECA/i, 2); if (wrist !== null) vals.wrist = wrist;
    const coup  = num(/ACOPLAMIENTO/i, 3); if (coup !== null) vals.coup = coup;
    const act   = num(/ACTIVIDAD/i,  3); if (act  !== null) vals.act  = act;
    const cargaLine = txt.split("\n").find(l => /^CARGA/i.test(l.trim()));
    if (cargaLine) {
      const kgM = cargaLine.match(/(\d+(?:\.\d+)?)\s*kg/i);
      if (kgM) { const kg = parseFloat(kgM[1]); vals.load = kg<5?0:kg<=10?1:2; }
      else { const sc = cargaLine.match(/\[([0-2])\]/); if (sc) vals.load = parseInt(sc[1]); }
    }
    const neckT  = bool(/Torsión.*cuello|cuello.*torsión/i);   if (neckT  !== null) vals.neckT  = neckT;
    const neckS  = bool(/Inclinación.*cuello|cuello.*inclin/i); if (neckS  !== null) vals.neckS  = neckS;
    const trunkT = bool(/Torsión.*tronco|tronco.*torsión/i);   if (trunkT !== null) vals.trunkT = trunkT;
    const trunkS = bool(/Inclinación.*tronco|tronco.*inclin/i); if (trunkS !== null) vals.trunkS = trunkS;
    const shr    = bool(/Hombro elevado/i);  if (shr    !== null) vals.shr    = shr;
    const abd    = bool(/Abducci/i);         if (abd    !== null) vals.abd    = abd;
    const wristT = bool(/Torsión.*mu.eca|mu.eca.*torsión/i); if (wristT !== null) vals.wristT = wristT;
    const shock  = bool(/Shock|fuerza brusca/i); if (shock !== null) vals.shock = shock;
  } else if (m === "RULA") {
    const ua    = num(/BRAZO SUPERIOR/i, 4); if (ua    !== null) vals.ua    = ua;
    const la    = num(/BRAZO INFERIOR/i, 2); if (la    !== null) vals.la    = la;
    const wrist = num(/MUÑECA|MU.ECA/i, 3); if (wrist !== null) vals.wrist = wrist;
    const neck  = num(/CUELLO/i,  4);        if (neck  !== null) vals.neck  = neck;
    const trunk = num(/TRONCO/i,  4);        if (trunk !== null) vals.trunk = trunk;
    const mA    = num(/Músculo A|Musculo A/i, 1); if (mA !== null) vals.mA = mA;
    const fA    = num(/Fuerza A/i, 3);       if (fA    !== null) vals.fA   = fA;
    const mB    = num(/Músculo B|Musculo B/i, 1); if (mB !== null) vals.mB = mB;
    const fB    = num(/Fuerza B/i, 3);       if (fB    !== null) vals.fB   = fB;
    const shr    = bool(/Hombro elevado/i);            if (shr    !== null) vals.shr    = shr;
    const wristT = bool(/Torsión.*mu.eca|mu.eca.*torsi[oó]n|giro.*mu.eca|prono.*supina/i); if (wristT !== null) vals.wristT = wristT;
    const neckT  = bool(/Torsión.*cuello|cuello.*torsi[oó]n|rotaci[oó]n.*cervic/i);   if (neckT  !== null) vals.neckT  = neckT;
    const trunkT = bool(/Torsión.*tronco|tronco.*torsi[oó]n|giro.*tronco|rotaci[oó]n.*tronco/i);   if (trunkT !== null) vals.trunkT = trunkT;
    const neckS  = bool(/Inclinación.*cuello|cuello.*inclin|lateralizaci[oó]n.*cuello|inclinaci[oó]n.*cervic|cuello.*lateral/i); if (neckS !== null) vals.neckS = neckS;
    const trunkS = bool(/Inclinación.*tronco|tronco.*inclin|lateralizaci[oó]n.*tronco|tronco.*lateral/i); if (trunkS!== null) vals.trunkS= trunkS;
  } else if (m === "OWAS") {
    const codeM = txt.match(/[Cc][oó]digo[^\d]*(\d)(\d)(\d)(\d)/);
    if (codeM) {
      vals.back = parseInt(codeM[1]); vals.arms = parseInt(codeM[2]);
      vals.legs = parseInt(codeM[3]); vals.load = parseInt(codeM[4]);
    } else {
      const bk = num(/ESPALDA/i, 4); if (bk !== null) vals.back = bk;
      const ar = num(/BRAZOS/i,  3); if (ar !== null) vals.arms = ar;
      const lg = num(/PIERNAS/i, 7); if (lg !== null) vals.legs = lg;
      const ld = num(/CARGA/i,   3); if (ld !== null) vals.load = ld;
    }
    // Fallback narrativo: si no se detectó piernas por [N], inferir de palabras clave
    if (vals.legs === undefined) {
      const t = txt.toLowerCase();
      if (/cuclillas|en\s+cuclillas|squatting/i.test(t))           vals.legs = 4;
      else if (/una\s+rodilla|arrodillado|kneeling/i.test(t))      vals.legs = 5;
      else if (/ambas\s+rodillas|dos\s+rodillas/i.test(t))         vals.legs = 6;
      else if (/flex.*rodilla|rodillas?\s+flex/i.test(t))           vals.legs = 4;
      else if (/caminando|desplaz[aá]ndose|walking/i.test(t))      vals.legs = 7;
      else if (/peso.*una\s+pierna|una\s+pierna/i.test(t))          vals.legs = 3;
    }
    if (vals.back === undefined) {
      const t = txt.toLowerCase();
      if (/doblad[ao].*gir|gir.*doblad/i.test(t))                  vals.back = 4;
      else if (/gir[ao]d[ao]|torsi[oó]n.*espalda/i.test(t))        vals.back = 3;
      else if (/doblad[ao]|flex.*tronco|inclinad/i.test(t))         vals.back = 2;
    }
  } else if (m === "NIOSH") {
    const H = txt.match(/\bH\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*cm/i);
    const V = txt.match(/\bV\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*cm/i);
    const D = txt.match(/\bD\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*cm/i);
    const A = txt.match(/\bA\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*°/i);
    const F = txt.match(/\bF\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*(?:lev|\/min)/i);
    if (H) vals.H = parseFloat(H[1]); if (V) vals.V = parseFloat(V[1]);
    if (D) vals.D = parseFloat(D[1]); if (A) vals.A = parseFloat(A[1]);
    if (F) vals.F = parseFloat(F[1]);
    const coupLine = txt.match(/Acoplamiento[^:\n]*:\s*(bueno|regular|pobre)/i);
    if (coupLine) {
      const cv = coupLine[1].toLowerCase();
      vals.coup = cv==="bueno"?"good" : cv==="regular"?"fair" : "poor";
    }
  }
  return Object.keys(vals).length > 0 ? vals : null;
}

// ── PROPAGACIÓN REBA→MMC (ORIGINAL SIN CAMBIOS) ──────────────────────────
function extractMMCFactors(vals, sourceMethod, texto) {
  if (sourceMethod !== "REBA") return [];
  const f = [];
  const add = id => { if (!f.includes(id)) f.push(id); };
  if (vals.trunkT === true) add("asim");
  if (vals.coup !== undefined && vals.coup >= 2) add("agr");
  if (vals.act  !== undefined && vals.act  >= 2) add("freq");
  if (vals.legs !== undefined && vals.legs >= 3) add("alt");
  if (texto) {
    if (/superficie.*inestable/i.test(texto))              add("sue");
    if (/carga.*inestable/i.test(texto))                   add("ines");
    if (/sin.*carretilla|sin.*ayuda.*mec/i.test(texto))    add("eq");
    if (/espacio.*restringido/i.test(texto))               add("esp");
    if (/encima.*hombro|bajo.*rodilla|nivel del suelo/i.test(texto)) add("alt");
  }
  return f;
}

// ══════════════════════════════════════════════════════════════════════════
// POSE ESTIMATION — Cálculo angular desde landmarks MediaPipe
// Funciones puras, no tocan estado ni React
// ══════════════════════════════════════════════════════════════════════════

// MediaPipe Pose landmark indices
const PL = {
  NOSE:0, LEFT_EYE:2, RIGHT_EYE:5, LEFT_EAR:7, RIGHT_EAR:8,
  LEFT_SHOULDER:11, RIGHT_SHOULDER:12, LEFT_ELBOW:13, RIGHT_ELBOW:14,
  LEFT_WRIST:15, RIGHT_WRIST:16, LEFT_HIP:23, RIGHT_HIP:24,
  LEFT_KNEE:25, RIGHT_KNEE:26, LEFT_ANKLE:27, RIGHT_ANKLE:28
};

// Calcula ángulo entre 3 puntos (en grados) — el ángulo está en el punto B
function angleOf(a, b, c) {
  const ab = {x: a.x - b.x, y: a.y - b.y};
  const cb = {x: c.x - b.x, y: c.y - b.y};
  const dot = ab.x * cb.x + ab.y * cb.y;
  const magAB = Math.sqrt(ab.x*ab.x + ab.y*ab.y);
  const magCB = Math.sqrt(cb.x*cb.x + cb.y*cb.y);
  if (magAB === 0 || magCB === 0) return 0;
  const cosA = Math.max(-1, Math.min(1, dot / (magAB * magCB)));
  return Math.round(Math.acos(cosA) * 180 / Math.PI);
}

// Calcula ángulo respecto a la vertical (línea recta hacia arriba)
function angleFromVertical(top, bottom) {
  const dx = top.x - bottom.x;
  const dy = top.y - bottom.y; // Y va hacia abajo en imagen
  const angle = Math.abs(Math.atan2(dx, -dy) * 180 / Math.PI);
  return Math.round(angle);
}

// Punto medio entre dos landmarks
function midpoint(a, b) {
  return {x: (a.x+b.x)/2, y: (a.y+b.y)/2, z: ((a.z||0)+(b.z||0))/2};
}

// Calcula todos los ángulos ergonómicos desde landmarks
function calcPoseAngles(lm) {
  const ls = lm[PL.LEFT_SHOULDER],  rs = lm[PL.RIGHT_SHOULDER];
  const le = lm[PL.LEFT_ELBOW],     re = lm[PL.RIGHT_ELBOW];
  const lw = lm[PL.LEFT_WRIST],     rw = lm[PL.RIGHT_WRIST];
  const lh = lm[PL.LEFT_HIP],       rh = lm[PL.RIGHT_HIP];
  const lk = lm[PL.LEFT_KNEE],      rk = lm[PL.RIGHT_KNEE];
  const la = lm[PL.LEFT_ANKLE],     ra = lm[PL.RIGHT_ANKLE];
  const nose = lm[PL.NOSE];

  const midSh = midpoint(ls, rs);
  const midHp = midpoint(lh, rh);

  // Tronco: ángulo del vector cadera→hombro respecto a la vertical
  const trunk = angleFromVertical(midSh, midHp);

  // Cuello: ángulo hombro_medio→nariz respecto a hombro_medio→cadera_medio (extensión del tronco)
  const neck = angleOf(nose, midSh, midHp);
  // Convertir: 180° = recto (0° flexión), menor = flexión
  const neckFlex = Math.max(0, 180 - neck);

  // Brazo superior (peor lado): ángulo cadera→hombro→codo
  const uaL = angleOf(lh, ls, le);
  const uaR = angleOf(rh, rs, re);
  const ua = Math.max(uaL, uaR); // peor lado

  // Brazo inferior: ángulo hombro→codo→muñeca
  const laL = angleOf(ls, le, lw);
  const laR = angleOf(rs, re, rw);
  const laAngle = Math.max(laL, laR);

  // Muñeca: ángulo codo→muñeca respecto al antebrazo (desviación)
  // Simplificado: diferencia angular del segmento muñeca respecto al antebrazo
  const wristL = Math.abs(180 - angleOf(le, lw, {x:lw.x, y:lw.y+0.1}));
  const wristR = Math.abs(180 - angleOf(re, rw, {x:rw.x, y:rw.y+0.1}));
  const wrist = Math.max(wristL, wristR);

  // Rodillas: ángulo cadera→rodilla→tobillo
  const kneeL = angleOf(lh, lk, la);
  const kneeR = angleOf(rh, rk, ra);
  const knee = Math.min(kneeL, kneeR); // peor = más flexionado = menor ángulo

  return {
    trunk: Math.round(trunk),
    neck: Math.round(neckFlex),
    ua: Math.round(ua),
    la: Math.round(laAngle),
    wrist: Math.round(wrist),
    knee: Math.round(knee),
    kneeL: Math.round(kneeL),
    kneeR: Math.round(kneeR),
    uaL: Math.round(uaL),
    uaR: Math.round(uaR)
  };
}

// Mapea ángulos medidos a niveles REBA
function mapAnglesToREBA(a) {
  // Tronco: erecto=1, 0-20=2, 20-60=3, >60=4
  const trunk = a.trunk<=5?1 : a.trunk<=20?2 : a.trunk<=60?3 : 4;
  // Cuello: 0-20=1, >20=2
  const neck = a.neck<=20?1 : 2;
  // Brazo superior: -20/20=1, 20-45=2, 45-90=3, >90=4
  const ua = a.ua<=20?1 : a.ua<=45?2 : a.ua<=90?3 : 4;
  // Brazo inferior: 60-100=1, fuera=2
  const la = (a.la>=60 && a.la<=100)?1 : 2;
  // Muñeca: 0-15=1, >15=2
  const wrist = a.wrist<=15?1 : 2;
  // Piernas: >150°= bilateral(1), 120-150=flex30-60(3), <120=flex>60(4)
  const legs = a.knee>=150?1 : a.knee>=120?3 : 4;

  return {trunk, neck, ua, la, wrist, legs};
}

// Mapea ángulos medidos a niveles RULA
function mapAnglesToRULA(a) {
  const ua = a.ua<=20?1 : a.ua<=45?2 : a.ua<=90?3 : 4;
  const la = (a.la>=60 && a.la<=100)?1 : 2;
  const wrist = a.wrist<=5?1 : a.wrist<=15?2 : 3;
  const neck = a.neck<=10?1 : a.neck<=20?2 : 3;
  const trunk = a.trunk<=5?1 : a.trunk<=20?2 : a.trunk<=60?3 : 4;
  return {ua, la, wrist, neck, trunk};
}

// Dibuja esqueleto sobre canvas y retorna dataURL
function drawSkeleton(imgUrl, landmarks) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      // Conexiones del esqueleto
      const connections = [
        [PL.LEFT_SHOULDER, PL.RIGHT_SHOULDER],
        [PL.LEFT_SHOULDER, PL.LEFT_ELBOW],[PL.LEFT_ELBOW, PL.LEFT_WRIST],
        [PL.RIGHT_SHOULDER, PL.RIGHT_ELBOW],[PL.RIGHT_ELBOW, PL.RIGHT_WRIST],
        [PL.LEFT_SHOULDER, PL.LEFT_HIP],[PL.RIGHT_SHOULDER, PL.RIGHT_HIP],
        [PL.LEFT_HIP, PL.RIGHT_HIP],
        [PL.LEFT_HIP, PL.LEFT_KNEE],[PL.LEFT_KNEE, PL.LEFT_ANKLE],
        [PL.RIGHT_HIP, PL.RIGHT_KNEE],[PL.RIGHT_KNEE, PL.RIGHT_ANKLE],
        [PL.NOSE, PL.LEFT_SHOULDER],[PL.NOSE, PL.RIGHT_SHOULDER],
      ];

      // Dibujar líneas
      ctx.strokeStyle = "#00FF88"; ctx.lineWidth = Math.max(2, img.width/200);
      connections.forEach(([a,b]) => {
        const pa = landmarks[a], pb = landmarks[b];
        if (pa && pb && pa.visibility > 0.5 && pb.visibility > 0.5) {
          ctx.beginPath();
          ctx.moveTo(pa.x * img.width, pa.y * img.height);
          ctx.lineTo(pb.x * img.width, pb.y * img.height);
          ctx.stroke();
        }
      });

      // Dibujar puntos
      const r = Math.max(3, img.width/150);
      landmarks.forEach(p => {
        if (p.visibility > 0.5) {
          ctx.beginPath();
          ctx.arc(p.x * img.width, p.y * img.height, r, 0, 2*Math.PI);
          ctx.fillStyle = "#FF4444"; ctx.fill();
          ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.stroke();
        }
      });

      res(canvas.toDataURL("image/jpeg", 0.85));
    };
    img.src = imgUrl;
  });
}

      const f = [];
      txt.split("\n").forEach(line => {
        if (/Alta frecuencia/i.test(line)      && /sí|si/i.test(line)) f.push("freq");
        if (/Torsión tronco/i.test(line)        && /sí|si/i.test(line)) f.push("asim");
        if (/Agarre deficiente/i.test(line)     && /sí|si/i.test(line)) f.push("agr");
        if (/Espacio restringido/i.test(line)   && /sí|si/i.test(line)) f.push("esp");
        if (/Carga inestable/i.test(line)       && /sí|si/i.test(line)) f.push("ines");
        if (/Superficie inestable/i.test(line)  && /sí|si/i.test(line)) f.push("sue");
        if (/Sin ayudas/i.test(line)            && /sí|si/i.test(line)) f.push("eq");
        if (/Distancia horizontal/i.test(line)  && /sí|si/i.test(line)) f.push("dist");
        if (/Encima.*hombro|bajo.*rodilla/i.test(line) && /sí|si/i.test(line)) f.push("alt");
      });
      if (f.length > 0) setMmc(p => ({...p, factores:[...new Set([...p.factores,...f])]}));
      setFilled(true);
      return;
    }
    const vals = (preVals && Object.keys(preVals).length > 0) ? preVals : parseIA(txt, m);
    if (vals) setReviewData({method:m, vals});
  };

  const confirmReview = () => {
    if (!reviewData) return;
    const {method:m, vals} = reviewData;
    if      (m==="REBA")  setReba(p  => ({...p,...vals}));
    else if (m==="RULA")  setRula(p  => ({...p,...vals}));
    else if (m==="OWAS")  setOwas(p  => ({...p,...vals}));
    else if (m==="NIOSH") setNiosh(p => ({...p,...vals}));
    if (m==="REBA" && info.metodos.includes("MMC")) {
      const newF = extractMMCFactors(vals, "REBA", aiMsg["REBA"]||"");
      if (newF.length > 0) setMmc(p => ({...p, factores:[...new Set([...p.factores,...newF])]}));
    }
    setFilled(true);
    setReviewData(null);
  };

  // Análisis de pose con MediaPipe
  const analyzePose = async (photoIdx) => {
    if (!photos[photoIdx] || typeof window.Pose === "undefined") {
      alert(typeof window.Pose === "undefined"
        ? "MediaPipe Pose no está disponible. Verifique su conexión a internet."
        : "No hay foto seleccionada.");
      return;
    }
    setPoseLoading(true);
    try {
      const pose = new window.Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`
      });
      pose.setOptions({
        modelComplexity: 2, // máxima precisión
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      const result = await new Promise((resolve, reject) => {
        pose.onResults(r => resolve(r));
        // Cargar imagen y enviar a MediaPipe
        const img = new Image();
        img.onload = async () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.width; canvas.height = img.height;
          canvas.getContext("2d").drawImage(img, 0, 0);
          try { await pose.send({image: canvas}); }
          catch(e) { reject(e); }
        };
        img.onerror = () => reject(new Error("No se pudo cargar la imagen"));
        img.src = photos[photoIdx].url;
        setTimeout(() => reject(new Error("Timeout de MediaPipe")), 30000);
      });

      if (!result.poseLandmarks || result.poseLandmarks.length < 33) {
        alert("No se detectó una persona completa en la imagen. Intente con otra foto.");
        setPoseLoading(false);
        return;
      }

      const angles = calcPoseAngles(result.poseLandmarks);
      const mappedREBA = mapAnglesToREBA(angles);
      const mappedRULA = mapAnglesToRULA(angles);
      const skeletonUrl = await drawSkeleton(photos[photoIdx].url, result.poseLandmarks);

      setPoseData({angles, mappedREBA, mappedRULA, skeletonUrl, photoIdx, photoLabel: photos[photoIdx].label});
      pose.close();
    } catch(e) {
      alert("Error en análisis de pose: " + (e.message || "intente de nuevo"));
    }
    setPoseLoading(false);
  };

  const getRes = () => {
    const r = {};
    if (info.metodos.includes("REBA"))  r.REBA  = calcReba(reba);
    if (info.metodos.includes("RULA"))  r.RULA  = calcRula(rula);
    if (info.metodos.includes("OWAS")) {
      const code = `${owas.back}${owas.arms}${owas.legs}${owas.load}`;
      const cat  = OWAS_TABLE[code] ?? 2;
      r.OWAS = {code, cat, level:cat-1, action:OWAS_ACCION[cat-1]};
    }
    if (info.metodos.includes("NIOSH")) r.NIOSH = calcNiosh(niosh);
    if (info.metodos.includes("MMC"))   r.MMC   = calcMMC(mmc, info.sexo||"masculino");
    return r;
  };

  const IS = {width:"100%",padding:"9px 12px",border:`1px solid ${C.cb}`,
    borderRadius:8,background:C.inp,fontSize:13,color:C.text,boxSizing:"border-box"};

  const wrap = ch => (
    <div style={{minHeight:"100vh",background:C.bg,padding:20,maxWidth:900,margin:"0 auto"}}>
      <Header/><Bar step={step}/>{ch}
    </div>
  );

  // ── STEP 0: DATOS (ORIGINAL) ─────────────────────────────────────────────
  if (step===0) return wrap(
    <Card title="📋 Datos del Puesto de Trabajo">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[["empresa","Empresa / Cliente"],["trabajador","Trabajador"],["dni","DNI"],
          ["cargo","Cargo"],["puesto","Puesto de Trabajo"],["area","Área / Sección"],
          ["tarea","Tarea Evaluada"],["evaluador","Evaluador"]].map(([k,l]) => (
          <div key={k}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>{l}</div>
            <input value={info[k]} onChange={e=>setInfo(p=>({...p,[k]:e.target.value}))} style={IS}/>
          </div>
        ))}
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>Sexo</div>
          <select value={info.sexo} onChange={e=>setInfo(p=>({...p,sexo:e.target.value}))} style={IS}>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>Fecha</div>
          <input type="date" value={info.fecha}
            onChange={e=>setInfo(p=>({...p,fecha:e.target.value}))} style={IS}/>
        </div>
      </div>
      <div style={{marginTop:14}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>
          Métodos a aplicar:
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {METHODS.map(m => {
            const active = info.metodos.includes(m);
            return (
              <button key={m} onClick={() => toggleMethod(m)} style={{
                padding:"8px 20px",
                border:`2px solid ${active ? C.orange : C.cb}`,borderRadius:24,

                fontWeight:700, fontSize:14, cursor:"pointer",
                color: active ? "white" : C.mid,
                boxShadow: active ? "0 3px 10px rgba(210,105,30,0.3)" : "none"

            );
          })}
        </div>
      </div>
      <Nav onNext={() => setStep(1)} nextLabel="Siguiente: Fotos →"
        disabled={!info.empresa || !info.metodos.length}/>
    </Card>

  // ── STEP 1: FOTOS (ORIGINAL) ─────────────────────────────────────────────
  if (step===1) return wrap(
    <Card title="📸 Fotografías del Puesto">
      <p style={{color:C.muted,fontSize:13,marginBottom:14}}>
        Sube fotos del trabajador — la IA las analizará automáticamente en el paso siguiente.
      </p>
      <div onClick={() => fileRef.current.click()} style={{
        border:`2px dashed ${C.orange}88`,borderRadius:12,

        background:"#FFF8F2",marginBottom:14
      }}>
        <div style={{fontSize:36,marginBottom:8}}>📷</div>
        <div style={{fontWeight:700,color:C.orange,fontSize:15}}>Subir fotos del trabajador</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>

        </div>
      </div>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
        onChange={e => Array.from(e.target.files).forEach((f,i) => {

      {photos.length > 0 && (
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>

            <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",

              <button onClick={() => setPhotos(ph => ph.filter((_,j) => j!==i))}
                style={{position:"absolute",top:6,right:6,width:22,height:22,
                  borderRadius:"50%",background:"#EF4444",border:"none",
                  color:"white",fontWeight:700,cursor:"pointer",fontSize:13}}>×</button>
            </div>
          ))}
        </div>
      )}
      <Nav onBack={() => setStep(0)} onNext={() => setStep(2)} nextLabel="Siguiente: Evaluación →"/>
    </Card>
  );

  // ── STEP 2: EVALUACIÓN (ORIGINAL + panel IA minimizable) ─────────────────
  if (step===2) return wrap(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {info.metodos.map(m => (
          <button key={m} onClick={() => {setMethod(m); setFilled(false); setReviewData(null);}}

              border:`2px solid ${method===m ? C.orange : C.cb}`,borderRadius:24,
              fontWeight:700, fontSize:14, cursor:"pointer",
              background: method===m ? `linear-gradient(135deg,${C.orange},${C.ob})` : "white",

              </button>
              <div style={{fontSize:11,color:C.muted,marginBottom:8}}>O haz clic en una foto individual:</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {photos.map((p,i) => (
                  <div key={i}
                    onClick={() => { if (!aiLoad) { setActivePhoto(i); analyzeOne(p.url, method); }}}
                    style={{cursor: aiLoad?"not-allowed":"pointer", borderRadius:8,
                      overflow:"hidden", opacity: aiLoad?0.6:1,
                      border:`3px solid ${activePhoto===i ? C.orange : C.cb}`}}>
                    <img src={p.url} alt="" style={{width:72,height:72,objectFit:"cover",display:"block"}}/>
                    <div style={{background: activePhoto===i ? C.orange : "rgba(0,0,0,0.55)",
                      color:"white", fontSize:10, padding:"2px 0",
                      textAlign:"center", fontWeight:700}}>{p.label}</div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div style={{padding:"14px",background:"#FFF8F2",
              border:`1px dashed ${C.orange}`,borderRadius:10,fontSize:13,color:C.orange}}>
              📷 Vuelve al Paso 2 y sube fotos para activar el análisis IA.
            </div>
          )}

          {aiLoad && (
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:12,
              padding:"12px 16px",background:`${C.orange}11`,
              border:`1px solid ${C.orange}44`,borderRadius:10}}>
              <span style={{fontSize:20}}>🔬</span>
              <div>
                <div style={{fontWeight:700,color:C.orange}}>Analizando con IA — {method}...</div>
                <div style={{fontSize:11,color:C.muted}}>Procesando análisis biomecánico</div>
              </div>
            </div>
          )}

          {/* Panel de revisión — ORIGINAL */}
          {reviewData && reviewData.method===method && (
            <div style={{marginTop:12,borderRadius:12,overflow:"hidden",
              border:`2px solid ${C.orange}`,background:"#FFFAF5"}}>
              <div style={{background:`linear-gradient(135deg,${C.header},${C.orange})`,
                color:"white",padding:"10px 16px",fontWeight:700,fontSize:13}}>
                🔍 Revisar valores detectados — confirma antes de aplicar
              </div>
              <div style={{padding:14}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8,marginBottom:12}}>
                  {Object.entries(reviewData.vals).map(([k,v]) => {
                    const LBL = {neck:"Cuello",trunk:"Tronco",legs:"Piernas",load:"Carga",
                      ua:"Brazo Sup",la:"Brazo Inf",wrist:"Muñeca",coup:"Acopl.",
                      act:"Actividad",shock:"Shock",neckT:"Torsión cuello",
                      neckS:"Incl. cuello",trunkT:"Torsión tronco",trunkS:"Incl. tronco",
                      shr:"Hombro elev.",abd:"Abducción",sup:"Apoyado",
                      wristT:"Torsión muñeca",back:"Espalda",arms:"Brazos",
                      H:"H (cm)",V:"V (cm)",D:"D (cm)",A:"A (°)",F:"F (/min)",
                      mid:"Línea media",mA:"Músculo A",fA:"Fuerza A",mB:"Músculo B",fB:"Fuerza B"};
                    const isBool = typeof v === "boolean";
                    return (
                      <div key={k} style={{background:"white",border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 10px"}}>
                        <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{LBL[k]||k}</div>
                        {isBool ? (
                          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13}}>
                            <input type="checkbox" checked={v}
                              onChange={e => setReviewData(rd => ({...rd, vals:{...rd.vals,[k]:e.target.checked}}))}/>
                            {v?"Sí":"No"}
                          </label>
                        ) : (
                          <input type="number" value={v}
                            onChange={e => setReviewData(rd => ({...rd, vals:{...rd.vals,[k]:+e.target.value}}))}
                            style={{width:"100%",padding:"4px 8px",border:`1px solid ${C.cb}`,borderRadius:6,
                              fontSize:14,fontWeight:700,color:C.orange,background:C.inp}}/>
                        )}
                      </div>
                    );
                  })}
                </div>

                {method==="REBA" && (() => {
                  const prev = calcReba({...reba,...reviewData.vals});
                  const niv  = NORMA.rebaRiesgo.find(x=>prev.fin<=x.max) || NORMA.rebaRiesgo[4];
                  return (
                    <div style={{background:C.r[prev.level]+"15",border:`1.5px solid ${C.r[prev.level]}`,
                      borderRadius:10,padding:12,marginBottom:12}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.r[prev.level],marginBottom:6}}>Vista previa:</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,fontSize:12}}>
                        {[["GRUPO A",prev.sA],["GRUPO B",prev.sB],["TABLA C",prev.sC],["FINAL",`${prev.fin}/15`]].map(([l,v],i) => (
                          <div key={i} style={{textAlign:"center",borderRadius:6,padding:6,
                            background: i===3 ? C.r[prev.level] : "white",
                            color: i===3 ? "white" : C.text}}>
                            <div style={{fontSize:10,opacity:0.7}}>{l}</div>
                            <div style={{fontWeight:800,fontSize:18}}>{v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{marginTop:8,fontSize:12,fontWeight:700,color:C.r[prev.level]}}>
                        Nivel {prev.level} — {niv.nivel} — {niv.accion}
                      </div>
                    </div>
                  );
                })()}

                <div style={{display:"flex",gap:8}}>
                  <button onClick={confirmReview} style={{
                    flex:1,padding:"11px",
                    background:`linear-gradient(135deg,${C.header},${C.orange})`,
                    color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                    ✅ Aplicar al formulario
                  </button>
                  <button onClick={() => setReviewData(null)} style={{
                    padding:"11px 16px",background:"white",color:C.muted,
                    border:`1px solid ${C.cb}`,borderRadius:10,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
                </div>
              </div>
            </div>
          )}

          {filled && !reviewData && (
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,
              padding:"10px 14px",background:"#f0fdf4",border:"1.5px solid #22C55E",borderRadius:8}}>
              <span style={{fontSize:18}}>✅</span>
              <span style={{fontWeight:700,color:"#166534",fontSize:13}}>
                Valores aplicados — revisa y ajusta si es necesario
              </span>
            </div>
          )}

          {/* CAMBIO #7: Panel IA minimizable en lugar de cerrable */}
          {aiMsg[method] && (
            <div style={{marginTop:12,borderRadius:12,overflow:"hidden",border:`2px solid ${C.orange}`}}>
              <div onClick={() => setAiCollapsed(p => ({...p,[method]:!p[method]}))}
                style={{background:`linear-gradient(135deg,${C.header},${C.orange})`,
                color:"white",padding:"10px 16px",fontWeight:700,fontSize:13,
                display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                <span>🩺 Análisis IA — {method}</span>
                <span style={{fontSize:16}}>{aiCollapsed[method]?"▸":"▾"}</span>
              </div>
              {!aiCollapsed[method] && (
                <div style={{padding:16,fontSize:12,whiteSpace:"pre-wrap",lineHeight:1.75,
                  fontFamily:"monospace",color:C.text,maxHeight:360,overflowY:"auto",background:"#FDFAF6"}}>
                  {aiMsg[method]}
                </div>
              )}
            </div>
          )}
        </Card>
      )}

      {/* Panel de Medición Angular — MediaPipe Pose */}
      {photos.length > 0 && (method==="REBA" || method==="RULA") && (
        <Card title="📐 Medición Angular Objetiva (MediaPipe Pose)">
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {photos.map((p,i) => (
              <div key={i} onClick={() => !poseLoading && analyzePose(i)}
                style={{cursor:poseLoading?"not-allowed":"pointer",borderRadius:8,overflow:"hidden",
                  border:`3px solid ${poseData?.photoIdx===i?"#22C55E":C.cb}`,opacity:poseLoading?0.6:1}}>
                <img src={p.url} alt="" style={{width:60,height:60,objectFit:"cover",display:"block"}}/>
                <div style={{fontSize:9,textAlign:"center",padding:"2px 0",
                  background:poseData?.photoIdx===i?"#22C55E":C.cb,
                  color:poseData?.photoIdx===i?"white":C.muted,fontWeight:700}}>{p.label}</div>
              </div>
            ))}
          </div>
          <button onClick={() => analyzePose(activePhoto||0)} disabled={poseLoading}
            style={{width:"100%",padding:"12px",marginBottom:12,
              background:poseLoading?C.muted:`linear-gradient(135deg,#059669,#10B981)`,
              color:"white",border:"none",borderRadius:10,cursor:poseLoading?"not-allowed":"pointer",
              fontWeight:700,fontSize:14,boxShadow:poseLoading?"none":"0 3px 10px rgba(5,150,105,0.35)"}}>
            {poseLoading ? "⏳ Detectando landmarks..." : "📐 Medir ángulos con MediaPipe Pose"}
          </button>
          <div style={{fontSize:11,color:C.muted,marginBottom:8}}>
            Selecciona una foto y haz clic para detectar puntos articulares y calcular ángulos reales.
          </div>

          {poseData && (
            <div style={{borderRadius:12,overflow:"hidden",border:`2px solid #059669`}}>
              <div style={{background:"linear-gradient(135deg,#065F46,#059669)",
                color:"white",padding:"10px 16px",fontWeight:700,fontSize:13}}>
                📐 Resultados — {poseData.photoLabel}
              </div>
              <div style={{padding:14}}>
                {/* Imagen con esqueleto */}
                <div style={{textAlign:"center",marginBottom:12}}>
                  <img src={poseData.skeletonUrl} alt="Esqueleto"
                    style={{maxWidth:"100%",maxHeight:300,borderRadius:8,border:`1px solid ${C.cb}`}}/>
                </div>
                {/* Tabla de ángulos medidos */}
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:12}}>
                  <thead><tr style={{background:"#059669",color:"white"}}>
                    <th style={{padding:"6px 10px",textAlign:"left"}}>Segmento</th>
                    <th style={{padding:"6px 10px",textAlign:"center"}}>Ángulo medido</th>
                    <th style={{padding:"6px 10px",textAlign:"center"}}>Nivel {method}</th>
                    <th style={{padding:"6px 10px",textAlign:"left"}}>Criterio</th>
                  </tr></thead>
                  <tbody>
                    {[
                      ["Tronco", `${poseData.angles.trunk}°`,
                        method==="REBA"?poseData.mappedREBA.trunk:poseData.mappedRULA.trunk,
                        poseData.angles.trunk<=5?"Erecto":poseData.angles.trunk<=20?"0-20°":poseData.angles.trunk<=60?"20-60°":">60°"],
                      ["Cuello", `${poseData.angles.neck}°`,
                        method==="REBA"?poseData.mappedREBA.neck:poseData.mappedRULA.neck,
                        poseData.angles.neck<=10?"0-10°":poseData.angles.neck<=20?"10-20°":">20°"],
                      ["Brazo superior", `${poseData.angles.ua}° (I:${poseData.angles.uaL}° D:${poseData.angles.uaR}°)`,
                        method==="REBA"?poseData.mappedREBA.ua:poseData.mappedRULA.ua,
                        poseData.angles.ua<=20?"-20/20°":poseData.angles.ua<=45?"20-45°":poseData.angles.ua<=90?"45-90°":">90°"],
                      ["Brazo inferior", `${poseData.angles.la}°`,
                        method==="REBA"?poseData.mappedREBA.la:poseData.mappedRULA.la,
                        poseData.angles.la>=60&&poseData.angles.la<=100?"60-100°":"Fuera rango"],

                    ["Muñeca (A)",rula.wrist,["Neutra","0-15°",">15°"][rula.wrist-1]],
                    ["Cuello (B)",rula.neck,["0-10°","10-20°",">20°","Extensión"][rula.neck-1]],
                    ["Tronco (B)",rula.trunk,["Erecto","0-20°","20-60°",">60°"][rula.trunk-1]],
                    ["Score A",r.sA,"Incluye músculo y fuerza"],["Score B",r.sB,"Incluye músculo y fuerza"]
                  ].map(([s,v,d],i) => (
                    <tr key={i} style={{background:i%2===0?C.bg:"white",borderBottom:`1px solid ${C.cb}`}}>
                      <td style={{padding:"5px 10px",fontWeight:600}}>{s}</td>
                      <td style={{padding:"5px 10px",textAlign:"center",fontWeight:700,color:C.orange}}>{v}</td>
                      <td style={{padding:"5px 10px",color:C.muted}}>{d}</td>
                    </tr>
                  ))}
                  <tr style={{background:C.r[r.level],color:"white",fontWeight:700}}>
                    <td style={{padding:"8px 10px",fontSize:14}}>SCORE FINAL RULA</td>
                    <td style={{padding:"8px 10px",textAlign:"center",fontSize:16}}>{r.fin}</td>
                    <td style={{padding:"8px 10px"}}>{acc.nivel} — {acc.accion}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          );
        })()}

        {/* Resultados OWAS */}
        {ri.OWAS && (() => {
          const n = nextSec(); const r = ri.OWAS;
          return (
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
                borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>{n}. Resultados OWAS</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:C.orange,color:"white"}}>
                  <th style={{padding:"6px 10px"}}>Dígito</th><th style={{padding:"6px 10px"}}>Segmento</th>
                  <th style={{padding:"6px 10px",textAlign:"center"}}>Valor</th><th style={{padding:"6px 10px"}}>Descripción</th>
                </tr></thead><tbody>
                  {[["1°","Espalda",owas.back,["","Recta","Doblada","Girada","Doblada+girada"][owas.back]],
                    ["2°","Brazos",owas.arms,["","Bajo hombros","Uno sobre","Ambos sobre"][owas.arms]],
                    ["3°","Piernas",owas.legs,["","Sentado","De pie","Peso en una","Flex rodillas","Una rodilla","Arrodillado","Caminando"][owas.legs]],
                    ["4°","Carga",owas.load,["","<10kg","10-20kg",">20kg"][owas.load]]
                  ].map(([d,s,v,desc],i) => (
                    <tr key={i} style={{background:i%2===0?C.bg:"white",borderBottom:`1px solid ${C.cb}`}}>
                      <td style={{padding:"5px 10px",textAlign:"center",fontWeight:700,color:C.orange}}>{d}</td>
                      <td style={{padding:"5px 10px",fontWeight:600}}>{s}</td>
                      <td style={{padding:"5px 10px",textAlign:"center",fontWeight:800,fontSize:16,color:C.orange}}>{v}</td>
                      <td style={{padding:"5px 10px"}}>{desc}</td>
                    </tr>
                  ))}
                  <tr style={{background:C.r[r.level],color:"white",fontWeight:700}}>
                    <td colSpan={2} style={{padding:"8px 10px",fontSize:14}}>CÓDIGO: {r.code}</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>Cat.{r.cat}</td>
                    <td style={{padding:"8px 10px"}}>{r.action}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          );
        })()}

        {/* Resultados NIOSH */}
        {ri.NIOSH && (() => {
          const n = nextSec(); const r = ri.NIOSH;
          return (
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
                borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>{n}. Resultados NIOSH</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:C.orange,color:"white"}}>
                  <th style={{padding:"6px 10px"}}>Factor</th>
                  <th style={{padding:"6px 10px",textAlign:"center"}}>Valor</th>
                  <th style={{padding:"6px 10px",textAlign:"center"}}>Multiplicador</th>
                </tr></thead><tbody>
                  {[["H — Dist. horizontal",`${niosh.H}cm`,(+r.HM).toFixed(3)],
                    ["V — Altura vertical",`${niosh.V}cm`,(+r.VM).toFixed(3)],
                    ["D — Desplazamiento",`${niosh.D}cm`,(+r.DM).toFixed(3)],
                    ["A — Ángulo asimetría",`${niosh.A}°`,(+r.AM).toFixed(3)],
                    ["F — Frecuencia",`${niosh.F}/min`,(+r.FM).toFixed(3)],
                    ["C — Acoplamiento",niosh.coup,(+r.CM).toFixed(3)]
                  ].map(([l,v,fm],i) => (
                    <tr key={i} style={{background:i%2===0?C.bg:"white",borderBottom:`1px solid ${C.cb}`}}>
                      <td style={{padding:"5px 10px"}}>{l}</td>
                      <td style={{padding:"5px 10px",textAlign:"center"}}>{v}</td>
                      <td style={{padding:"5px 10px",textAlign:"center",fontWeight:700,color:C.orange}}>{fm}</td>
                    </tr>
                  ))}
                  <tr style={{background:C.r[r.level],color:"white",fontWeight:700}}>
                    <td style={{padding:"8px 10px"}}>RWL = 23×HM×VM×DM×AM×FM×CM</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>{r.RWL} kg</td>
                    <td style={{padding:"8px 10px",textAlign:"center"}}>LI = {r.LI}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          );
        })()}

        {/* Resultados MMC */}
        {ri.MMC && mmc.peso>0 && (() => {
          const n = nextSec(); const r = ri.MMC;
          return (
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
                borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>{n}. MMC — RM N° 375-2008-TR / ISO 11228-1</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:8}}>
                <tbody>
                  {[["Peso manipulado",`${mmc.peso} kg`],["Sexo",info.sexo==="masculino"?"Masculino":"Femenino"],
                    ["Grupo",mmc.grupo],["Frecuencia",mmc.frec],
                    ["Límite RM 375",`${r.limRM} kg (entrenado: ${r.limEnt} kg)`],
                    ["Límite ISO 11228 ("+mmc.frec+")",`${r.limISO} kg`],
                    ["Exceso",+r.exc>0?`${r.exc} kg (${r.pct}%)`:"Dentro del límite"],
                    ["Capacitación",mmc.form==="si"?"Sí":"No (agravante Art.6)"],
                    ["Factores adicionales",`${r.nF} identificados`]
                  ].map(([l,v],i) => (
                    <tr key={i} style={{background:i%2===0?C.bg:"white",borderBottom:`1px solid ${C.cb}`}}>
                      <td style={{padding:"5px 10px",fontWeight:600,width:"50%"}}>{l}</td>
                      <td style={{padding:"5px 10px"}}>{v}</td>
                    </tr>
                  ))}
                  <tr style={{background:C.r[r.level],color:"white",fontWeight:700}}>
                    <td style={{padding:"8px 10px"}}>RESULTADO MMC</td>
                    <td style={{padding:"8px 10px"}}>RM 375: {r.cumRM?"✓ CUMPLE":"✗ INCUMPLE"} · ISO: {r.cumISO?"✓ CUMPLE":"✗ INCUMPLE"} · {RL[r.level].toUpperCase()}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          );
        })()}

        {/* Tabla interpretación REBA */}
        {ri.REBA && (
          <div style={{marginBottom:20}}>
            <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
              borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>Interpretación del Nivel de Riesgo REBA</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:C.orange,color:"white"}}>
                <th style={{padding:"6px 10px",textAlign:"center"}}>Puntuación</th>
                <th style={{padding:"6px 10px",textAlign:"center"}}>Nivel</th>
                <th style={{padding:"6px 10px"}}>Riesgo</th>
                <th style={{padding:"6px 10px"}}>Acción</th>
              </tr></thead><tbody>
                {[["1",0,"Inapreciable","No requiere acción"],["2-3",1,"Bajo","Puede requerirse acción"],
                  ["4-7",2,"Medio","Se requiere acción"],["8-10",3,"Alto","Acción pronto"],
                  ["11-15",4,"Muy Alto","ACTUACIÓN INMEDIATA"]].map(([pts,lvl,rsk,act]) => (
                  <tr key={lvl} style={{background:ri.REBA.level===lvl?C.r[lvl]+"33":lvl%2===0?C.bg:"white",
                    fontWeight:ri.REBA.level===lvl?700:400,borderBottom:`1px solid ${C.cb}`}}>
                    <td style={{padding:"5px 10px",textAlign:"center"}}>{pts}</td>
                    <td style={{padding:"5px 10px",textAlign:"center",fontWeight:700}}>{lvl}</td>
                    <td style={{padding:"5px 10px",color:C.r[lvl],fontWeight:700}}>{rsk}</td>
                    <td style={{padding:"5px 10px"}}>{act}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* Recomendaciones dinámicas */}
        {(() => { const n = nextSec(); return (
          <div style={{marginBottom:20}}>
            <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
              borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>{n}. Recomendaciones Ergonómicas</div>
            <div style={{marginBottom:10}}>
              <div style={{fontWeight:700,marginBottom:6,color:C.mid}}>{n}.1 Medidas de Ingeniería</div>
              <ul style={{paddingLeft:20,fontSize:12,lineHeight:1.8}}>
                {recs.ing.map((r,i) => <li key={i}>{r}</li>)}
              </ul>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontWeight:700,marginBottom:6,color:C.mid}}>{n}.2 Medidas Administrativas</div>
              <ul style={{paddingLeft:20,fontSize:12,lineHeight:1.8}}>
                {recs.adm.map((r,i) => <li key={i}>{r}</li>)}
              </ul>
            </div>
            <div>
              <div style={{fontWeight:700,marginBottom:6,color:C.mid}}>{n}.3 Vigilancia Médica</div>
              <ul style={{paddingLeft:20,fontSize:12,lineHeight:1.8}}>
                {recs.vig.map((r,i) => <li key={i}>{r}</li>)}
              </ul>
            </div>
          </div>
        );})()}

        {/* Conclusiones dinámicas */}
        {(() => { const n = nextSec(); return (
          <div style={{marginBottom:24}}>
            <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
              borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>{n}. Conclusiones</div>
            <ol style={{paddingLeft:20,fontSize:12,lineHeight:2}}>
              {conclusiones.map((c,i) => <li key={i}>{c}</li>)}
            </ol>
          </div>
        );})()}

        {/* Anexo: Medición Angular Objetiva — solo si se ejecutó pose estimation */}
        {poseData && (
          <div style={{marginBottom:20}}>
            <div style={{fontWeight:700,color:"#059669",fontSize:14,marginBottom:10,
              borderBottom:"2px solid #059669",paddingBottom:4}}>
              Anexo: Medición Angular Objetiva (MediaPipe Pose)
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:12}}>
              <div>
                <img src={poseData.skeletonUrl} alt="Landmarks"
                  style={{width:"100%",borderRadius:8,border:`1px solid ${C.cb}`}}/>
                <div style={{fontSize:10,color:C.muted,textAlign:"center",marginTop:4}}>
                  Foto: {poseData.photoLabel} · 33 landmarks detectados
                </div>
              </div>
              <div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{background:"#059669",color:"white"}}>
                    <th style={{padding:"5px 8px",textAlign:"left"}}>Segmento</th>
                    <th style={{padding:"5px 8px",textAlign:"center"}}>Ángulo</th>
                    <th style={{padding:"5px 8px",textAlign:"center"}}>REBA</th>
                    <th style={{padding:"5px 8px",textAlign:"center"}}>RULA</th>
                  </tr></thead>
                  <tbody>
                    {[["Tronco",poseData.angles.trunk,poseData.mappedREBA.trunk,poseData.mappedRULA.trunk],
                      ["Cuello",poseData.angles.neck,poseData.mappedREBA.neck,poseData.mappedRULA.neck],
                      ["Brazo sup.",poseData.angles.ua,poseData.mappedREBA.ua,poseData.mappedRULA.ua],
                      ["Brazo inf.",poseData.angles.la,poseData.mappedREBA.la,poseData.mappedRULA.la],
                      ["Muñeca",poseData.angles.wrist,poseData.mappedREBA.wrist,poseData.mappedRULA.wrist],
                      ["Rodillas",poseData.angles.knee,poseData.mappedREBA.legs,"—"]
                    ].map(([s,a,r,u],i) => (
                      <tr key={i} style={{borderBottom:`1px solid ${C.cb}`,background:i%2===0?C.bg:"white"}}>
                        <td style={{padding:"4px 8px",fontWeight:600}}>{s}</td>
                        <td style={{padding:"4px 8px",textAlign:"center",fontWeight:700,color:"#059669"}}>{a}°</td>
                        <td style={{padding:"4px 8px",textAlign:"center",color:C.orange}}>{r}</td>
                        <td style={{padding:"4px 8px",textAlign:"center",color:C.orange}}>{u}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{fontSize:10,color:C.muted,marginTop:8,lineHeight:1.6}}>
                  <strong>Metodología:</strong> Detección de 33 landmarks articulares mediante MediaPipe Pose
                  (Google, modelo BlazePose GHUM 3D, complexity 2). Ángulos calculados por trigonometría
                  vectorial (arctan2) entre segmentos corporales. Precisión reportada: ±3-5° en condiciones controladas.
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Disclaimer legal + Vigencia normativa */}
        <div style={{marginBottom:20,padding:16,background:"#FEFCE8",border:"1.5px solid #CA8A04",
          borderRadius:10,fontSize:11,lineHeight:1.8,color:"#713F12"}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:6,color:"#854D0E"}}>NOTA LEGAL Y METODOLÓGICA</div>
          <p>Los valores posturales fueron estimados mediante análisis de imagen asistido por inteligencia artificial
          y posteriormente validados, ajustados y confirmados por el médico evaluador firmante. La herramienta de IA
          constituye un instrumento de apoyo técnico; la interpretación clínica, el juicio profesional y la
          responsabilidad técnico-legal del presente informe recaen exclusivamente en el profesional firmante.</p>
          <p style={{marginTop:6}}>Marco normativo aplicado: <strong>RM N° 375-2008-TR</strong> (vigente desde
          28/11/2008, Norma Básica de Ergonomía y de Procedimiento de Evaluación de Riesgo Disergonómico) ·
          <strong> ISO 11228-1:2003</strong> (Ergonomics — Manual handling — Lifting and carrying).
          El evaluador es responsable de verificar la vigencia de las normas aplicadas al momento de la evaluación.</p>
          <p style={{marginTop:6}}>Herramienta: PANACEA ERGO v2.1 · Tablas de cálculo: REBA (Hignett &amp; McAtamney, 2000),
          RULA (McAtamney &amp; Corlett, 1993), OWAS (Karhu et al., 1977), NIOSH (Waters et al., 1993 revisada).</p>
        </div>

        {/* Firma con timestamp + QR verificación */}
        {(() => {
          const qrData = encodeURIComponent(JSON.stringify({
            app:"PANACEA ERGO v2.1",eval:info.evaluador,emp:info.empresa,
            trab:info.trabajador,fecha:info.fecha,metodos:info.metodos,
            reba:ri.REBA?ri.REBA.fin:null,rula:ri.RULA?ri.RULA.fin:null,
            owas:ri.OWAS?ri.OWAS.code:null,niosh:ri.NIOSH?ri.NIOSH.LI:null,
            mmc:ri.MMC?mmc.peso+"kg":null
          }));
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=${qrData}`;
          return (
            <div style={{borderTop:`2px solid ${C.cb}`,paddingTop:20,
              display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
                <img src={qrUrl} alt="QR" style={{width:80,height:80,borderRadius:4,border:`1px solid ${C.cb}`}}/>
                <div style={{fontSize:11,color:C.muted}}>
                  <div>PANACEA ERGO v2.1</div>
                  <div>Normativa: RM 375-2008-TR · ISO 11228-1</div>
                  <div>Documento confidencial — uso médico ocupacional</div>
                  <div style={{marginTop:6,fontFamily:"monospace",fontSize:10}}>
                    Generado: {new Date().toISOString().replace("T"," ").substring(0,19)} UTC
                  </div>
                  <div style={{fontSize:9,color:C.muted,marginTop:2}}>QR: datos del informe para verificación</div>
                </div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{borderTop:`1px solid ${C.text}`,paddingTop:8,width:260}}>
                  <div style={{fontWeight:800,fontSize:14}}>{info.evaluador}</div>
                  <div style={{fontSize:11,color:C.muted}}>Médico Especialista en Medicina Ocupacional</div>
                  <div style={{fontSize:11,color:C.muted}}>y del Medio Ambiente — UPCH</div>
                  <div style={{fontSize:11,color:C.orange,fontWeight:600}}>CMP 102517 · RNE/RNA 13334</div>
                  <div style={{fontSize:11,color:C.muted}}>Panacea Medicina Ocupacional · Arequipa, {info.fecha}</div>
                </div>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
