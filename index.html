function calcNiosh(s){const HM=s.H<=25?1:Math.min(25/s.H,1);const VM=Math.max(1-(0.003*Math.abs(s.V-75)),0);const DM=s.D<25?0.87:Math.min(0.82+(4.5/s.D),1);const AM=Math.max(1-(0.0032*s.A),0);const fV={"<1h":[0.85,0.81,0.75,0.65,0.55,0.45,0,0,0,0,0,0,0],"1-2h":[0.95,0.92,0.88,0.84,0.79,0.72,0.6,0.5,0.42,0.35,0.3,0.26,0.23],"2-8h":[1,0.97,0.94,0.91,0.88,0.84,0.8,0.75,0.7,0.6,0.52,0.45,0]};const fi=s.F<=0.2?0:s.F<=0.5?1:s.F<=1?2:s.F<=2?3:s.F<=3?4:s.F<=4?5:s.F<=5?6:s.F<=6?7:s.F<=7?8:s.F<=8?9:s.F<=9?10:s.F<=10?11:12;const FM=fV[s.dur]?.[fi]??0.45;const CM=s.coup==="good"?1:s.coup==="fair"?0.95:0.90;const RWL=23*HM*VM*DM*AM*FM*CM;const LI=s.L/Math.max(RWL,0.1);return{HM,VM,DM,AM,FM,CM,RWL:RWL.toFixed(2),LI:LI.toFixed(2),level:LI<=1?0:LI<=2?1:LI<=3?2:LI<=5?3:4};}

const FMMC=[{id:"peso",l:"Peso excede límite RM 375"},{id:"freq",l:"Alta frecuencia >4/min"},{id:"dist",l:"Distancia horizontal >50cm"},{id:"alt",l:"Encima hombros o bajo rodillas"},{id:"asim",l:"Torsión tronco al levantar"},{id:"agr",l:"Agarre deficiente"},{id:"esp",l:"Espacio restringido"},{id:"ines",l:"Carga inestable"},{id:"sue",l:"Superficie inestable"},{id:"eq",l:"Sin ayudas mecánicas"}];
function calcMMC(s, sexo="masculino"){
  // RM 375-2008-TR — norma base peruana
  const rm375 = NORMA.getLimiteRM375(sexo);
  // ISO 11228 — complemento por frecuencia
  const isoLim = NORMA.getLimiteISO(s.grupo, s.frec);

  // Límite aplicable: el más restrictivo entre RM 375 y ISO 11228
  const limAplicable = Math.min(rm375.general, isoLim);

  const exc = Math.max(s.peso - limAplicable, 0);
  const excRM = Math.max(s.peso - rm375.general, 0);
  const excISO = Math.max(s.peso - isoLim, 0);
  const pct = limAplicable>0 ? ((s.peso/limAplicable - 1)*100) : 0;
  const nF = s.factores.length;

  let level = s.peso<=limAplicable ? 0
    : s.peso<=limAplicable*1.2 ? 1
    : s.peso<=limAplicable*1.5 ? 2
    : s.peso<=limAplicable*2   ? 3 : 4;
  if(nF>=3 && level<2) level=2;
  if(nF>=5 && level<3) level=3;

  return {
    limRM375: rm375.general,
    limEntrenado: rm375.entrenado,
    limISO: isoLim,
    limAplicable,
    exceso: exc.toFixed(1),
    excesoRM: excRM.toFixed(1),
    excesoISO: excISO.toFixed(1),
    pct: pct.toFixed(0),
    nF, level,
    cumpleRM375: s.peso <= rm375.general,
    cumpleISO: s.peso <= isoLim,
  };

// ── APP PRINCIPAL ────────────────────────────────────────────────────────────
function App() {
  const {useState,useRef} = React;
  const [step,setStep]=useState(0);
  const [info,setInfo]=useState({empresa:"",trabajador:"",dni:"",sexo:"masculino",cargo:"",puesto:"",area:"",tarea:"",fecha:new Date().toISOString().split("T")[0],evaluador:"Dr. Miguel Ochoa Cuadros",metodos:[]});
  const [photos,setPhotos]=useState([]);
  const [method,setMethod]=useState(null);
  const [reba,setReba]=useState({neck:1,neckT:false,neckS:false,trunk:1,trunkT:false,trunkS:false,legs:1,load:0,shock:false,ua:1,shr:false,abd:false,sup:false,la:1,wrist:1,wristT:false,coup:0,act:0});
  const [rula,setRula]=useState({ua:1,shr:false,sup:false,la:1,mid:false,wrist:1,wristT:false,mA:0,fA:0,neck:1,neckT:false,neckS:false,trunk:1,trunkT:false,trunkS:false,legs:1,mB:0,fB:0});
  const [owas,setOwas]=useState({back:1,arms:1,legs:1,load:1});
  const [niosh,setNiosh]=useState({L:0,H:25,V:75,D:25,A:0,F:1,dur:"2-8h",coup:"good"});
  const [mmc,setMmc]=useState({peso:0,grupo:"",frec:"frecuente",form:"no",factores:[]});

  // Sincroniza grupo MMC con sexo y edad automáticamente
  React.useEffect(()=>{
    if(!info.sexo) return;
    const esVaron = info.sexo==="masculino";
    // Solo cambia si el grupo actual no coincide con el sexo
    const grupoActual = mmc.grupo;
    const esGrupoVaron = grupoActual.includes("Varón");
    if(esVaron && !esGrupoVaron) setMmc(p=>({...p,grupo:"Varón adulto (18-45 años)"}));
    if(!esVaron && esGrupoVaron) setMmc(p=>({...p,grupo:"Mujer adulta (18-45 años)"}));
  },[info.sexo]);

  // Cuando hay análisis IA de REBA/RULA/OWAS/NIOSH, auto-propaga datos relevantes a MMC
  React.useEffect(()=>{
    const textoReba = aiMsg["REBA"]||"";
    const textoRula = aiMsg["RULA"]||"";
    const texto = textoReba || textoRula;
    if(!texto || !info.metodos.includes("MMC")) return;

    // Detecta factores de riesgo desde el análisis REBA/RULA ya hecho
    const factores = [...mmc.factores];
    const add = (id) => { if(!factores.includes(id)) factores.push(id); };

    if(/torsi[oó]n|giro.*tronco/i.test(texto)) add("asim");
    if(/agarre.*malo|agarre.*deficiente|acoplamiento.*[23]|sin asa/i.test(texto)) add("agr");
    if(/encima.*hombro|bajo.*rodilla|nivel del suelo|desde el suelo/i.test(texto)) add("alt");
    if(/espacio.*restringido|espacio.*reducido/i.test(texto)) add("esp");
    if(/inestable|irregular/i.test(texto)) add("ines");
    if(/superficie.*inestable|desnivel/i.test(texto)) add("sue");
    if(/sin.*carretilla|sin.*ayuda.*mec|sin.*equipo/i.test(texto)) add("eq");
    if(/frecuencia.*alta|>4.*min|repetitiv/i.test(texto)) add("freq");

    // Verifica si el peso actual excede el límite según grupo y frecuencia
    const limObj = NORMA.limites.find(l=>l.g===mmc.grupo)||NORMA.limites[0];
    const lim = mmc.frec==="ocasional"?limObj.o:mmc.frec==="frecuente"?limObj.f:limObj.mf;
    if(mmc.peso > lim) add("peso");

    if(factores.length !== mmc.factores.length)
      setMmc(p=>({...p, factores}));
  },[aiMsg]);
  const [reviewData,setReviewData]=useState(null); // panel de revisión post-IA
  const [aiMsg,setAiMsg]=useState({});
  const [aiLoad,setAiLoad]=useState(false);
  const [activeP,setActiveP]=useState(null);
  const [autoFilled,setAutoFilled]=useState(false);
  const fileRef=useRef();

  const toggleM=m=>setInfo(p=>({...p,metodos:p.metodos.includes(m)?p.metodos.filter(x=>x!==m):[...p.metodos,m]}));

  const compress=url=>new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let{width:w,height:h}=img;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.75));
    };img.src=url;
  });

  // Parsea el texto IA y auto-puebla REBA con captura mejorada de carga
  const autoFillReba = (text, pesoMMC=null) => {
    const n = (pat) => { const m = text.match(pat); return m ? parseInt(m[1]) : null; };
    const b = (pat) => { const m = text.match(pat); return m ? /sí|si|yes/i.test(m[1]) : null; };
    const vals = {};

    const cuello = n(/CUELLO[^:\n]*:\s*\[?(\d)\]?/i); if(cuello) vals.neck = Math.min(cuello,2);
    const tronco = n(/TRONCO[^:\n]*:\s*\[?(\d)\]?/i); if(tronco) vals.trunk = Math.min(tronco,4);
    const piernas = n(/PIERNAS[^:\n]*:\s*\[?(\d)\]?/i); if(piernas) vals.legs = Math.min(piernas,4);

    // Carga: prioriza peso MMC si está disponible, luego parsea el texto
    if(pesoMMC !== null) {
      vals.load = pesoMMC < 5 ? 0 : pesoMMC <= 10 ? 1 : 2;
      // Si el texto menciona fuerza brusca o impacto
      if(/brusco|impacto|shock|súbito|repentino/i.test(text)) vals.shock = true;
    } else {
      const cargaNum = text.match(/(?:peso|carga|levanta)[^:]*?(\d+(?:\.\d+)?)\s*kg/i);
      if(cargaNum) {
        const kg = parseFloat(cargaNum[1]);
        vals.load = kg < 5 ? 0 : kg <= 10 ? 1 : 2;
      } else {
        const cargaScore = n(/CARGA[^:\n]*:\s*\[?(\d)\]?/i);
        if(cargaScore !== null) vals.load = Math.min(cargaScore, 2);
      }
      if(/brusco|impacto|shock|súbito/i.test(text)) vals.shock = true;
    }

    const brazoS = n(/BRAZO SUPERIOR[^:\n]*:\s*\[?(\d)\]?/i); if(brazoS) vals.ua = Math.min(brazoS,4);
    const brazoI = n(/BRAZO INFERIOR[^:\n]*:\s*\[?(\d)\]?/i); if(brazoI) vals.la = Math.min(brazoI,2);
    const muneca = n(/MU[ÑN]ECA[^:\n]*:\s*\[?(\d)\]?/i); if(muneca) vals.wrist = Math.min(muneca,2);
    const acop = n(/ACOPLAMIENTO[^:\n]*:\s*\[?(\d)\]?/i); if(acop!==null) vals.coup = Math.min(acop,3);
    const act = n(/ACTIVIDAD[^:\n]*:\s*\[?(\d)\]?/i); if(act!==null) vals.act = Math.min(act,3);

    const tNeck = b(/[Tt]orsión[^:\n]*:?\s*(sí|si|no|yes).*cuello|cuello.*[Tt]orsión[^:\n]*:?\s*(sí|si|no|yes)/i)
                ?? b(/CUELLO[^]*?[Tt]orsión:\s*(sí|si|no|yes)/i); if(tNeck!==null) vals.neckT = tNeck;
    const sNeck = b(/[Ii]nclinación[^:\n]*:?\s*(sí|si|no|yes).*cuello|cuello.*[Ii]nclinación[^:\n]*:?\s*(sí|si|no|yes)/i)
                ?? b(/CUELLO[^]*?[Ii]nclinación[^:\n]*:\s*(sí|si|no|yes)/i); if(sNeck!==null) vals.neckS = sNeck;
    const tTrunk = b(/[Tt]orsión[^:\n]*:?\s*(sí|si|no|yes).*tronco|tronco.*[Tt]orsión[^:\n]*:?\s*(sí|si|no|yes)/i)
                 ?? b(/TRONCO[^]*?[Tt]orsión:\s*(sí|si|no|yes)/i); if(tTrunk!==null) vals.trunkT = tTrunk;
    const sTrunk = b(/[Ii]nclinación[^:\n]*:?\s*(sí|si|no|yes).*tronco|tronco.*[Ii]nclinación[^:\n]*:?\s*(sí|si|no|yes)/i)
                 ?? b(/TRONCO[^]*?[Ii]nclinación:\s*(sí|si|no|yes)/i); if(sTrunk!==null) vals.trunkS = sTrunk;
    const shr = b(/[Hh]ombro elevado[^:\n]*:\s*(sí|si|no|yes)/i); if(shr!==null) vals.shr = shr;
    const abd = b(/[Aa]bducci[oó]n[^:\n]*:\s*(sí|si|no|yes)/i); if(abd!==null) vals.abd = abd;
    const sup = b(/[Aa]poyado[^:\n]*:\s*(sí|si|no|yes)/i); if(sup!==null) vals.sup = sup;
    const wristT = b(/[Tt]orsión[^:\n]*mu[ñn]eca[^:\n]*:\s*(sí|si|no|yes)/i)
                 ?? b(/MU[ÑN]ECA[^]*?[Tt]orsión:\s*(sí|si|no|yes)/i); if(wristT!==null) vals.wristT = wristT;

    return vals;
  };

  // Parsea RULA
  const autoFillRula = (text) => {
    const n = (pat) => { const m = text.match(pat); return m ? parseInt(m[1]) : null; };
    const b = (pat) => { const m = text.match(pat); return m ? /sí|si|yes/i.test(m[1]) : null; };
    const vals = {};
    const ua = n(/BRAZO SUPERIOR[^:]*:\s*\[?(\d)\]?/i); if(ua) vals.ua = ua;
    const la = n(/BRAZO INFERIOR[^:]*:\s*\[?(\d)\]?/i); if(la) vals.la = la;
    const wrist = n(/MU[ÑN]ECA[^:]*:\s*\[?(\d)\]?/i); if(wrist) vals.wrist = wrist;
    const neck = n(/CUELLO[^:]*:\s*\[?(\d)\]?/i); if(neck) vals.neck = neck;
    const trunk = n(/TRONCO[^:]*:\s*\[?(\d)\]?/i); if(trunk) vals.trunk = trunk;
    const legs = n(/PIERNAS[^:]*:\s*\[?(\d)\]?/i); if(legs) vals.legs = legs;
    const mA = n(/[Mm]úsculo A[^:]*:\s*\[?(\d)\]?/i); if(mA!==null) vals.mA = mA;
    const fA = n(/[Ff]uerza A[^:]*:\s*\[?(\d)\]?/i); if(fA!==null) vals.fA = fA;
    const mB = n(/[Mm]úsculo B[^:]*:\s*\[?(\d)\]?/i); if(mB!==null) vals.mB = mB;
    const fB = n(/[Ff]uerza B[^:]*:\s*\[?(\d)\]?/i); if(fB!==null) vals.fB = fB;
    const shr = b(/[Hh]ombro elevado[^:]*:\s*(sí|si|no|yes)/i); if(shr!==null) vals.shr = shr;
    const sup = b(/[Aa]poyado[^:]*:\s*(sí|si|no|yes)/i); if(sup!==null) vals.sup = sup;
    const mid = b(/[Ll]ínea media[^:]*:\s*(sí|si|no|yes)/i); if(mid!==null) vals.mid = mid;
    const wristT = b(/[Tt]orsión[^:]*mu[ñn]eca[^:]*:\s*(sí|si|no|yes)/i) ?? b(/mu[ñn]eca.*[Tt]orsión[^:]*:\s*(sí|si|no|yes)/i); if(wristT!==null) vals.wristT = wristT;
    const neckT = b(/[Tt]orsión[^:]*cuello[^:]*:\s*(sí|si|no|yes)/i); if(neckT!==null) vals.neckT = neckT;
    const neckS = b(/[Ii]nclinación[^:]*cuello[^:]*:\s*(sí|si|no|yes)/i); if(neckS!==null) vals.neckS = neckS;
    const trunkT = b(/[Tt]orsión[^:]*tronco[^:]*:\s*(sí|si|no|yes)/i); if(trunkT!==null) vals.trunkT = trunkT;
    const trunkS = b(/[Ii]nclinación[^:]*tronco[^:]*:\s*(sí|si|no|yes)/i); if(trunkS!==null) vals.trunkS = trunkS;
    if(Object.keys(vals).length > 0) { setRula(p=>({...p,...vals})); return Object.keys(vals).length; }
    return 0;
  };
  const autoFillOwas = (text) => {
    const n = (pat) => { const m = text.match(pat); return m ? parseInt(m[1]) : null; };
    const vals = {};
    const back = n(/ESPALDA[^:]*:\s*\[?(\d)\]?/i); if(back) vals.back = back;

    const load = n(/CARGA[^:]*:\s*\[?(\d)\]?/i); if(load) vals.load = load;
    if(Object.keys(vals).length > 0) { setOwas(p=>({...p,...vals})); return Object.keys(vals).length; }
    return 0;
  };

  // Parsea NIOSH
  const autoFillNiosh = (text) => {
    const n = (pat) => { const m = text.match(pat); return m ? parseFloat(m[1]) : null; };
    const vals = {};
    const H = n(/\bH[^\d]*(\d+(?:\.\d+)?)\s*cm/i); if(H) vals.H = H;

    else if(m==="OWAS") { const v={}; const n=pat=>{const x=text.match(pat);return x?parseInt(x[1]):null;}; const bk=n(/ESPALDA[^:\n]*:\s*\[?(\d)\]?/i);if(bk)v.back=Math.min(bk,4);const ar=n(/BRAZOS[^:\n]*:\s*\[?(\d)\]?/i);if(ar)v.arms=Math.min(ar,3);const lg=n(/PIERNAS[^:\n]*:\s*\[?(\d)\]?/i);if(lg)v.legs=Math.min(lg,7);const ld=n(/CARGA[^:\n]*:\s*\[?(\d)\]?/i);if(ld)v.load=Math.min(ld,3);vals=v; }
    else if(m==="NIOSH") { const v={}; const n=pat=>{const x=text.match(pat);return x?parseFloat(x[1]):null;}; const H=n(/\bH[^\d\n]*?(\d+(?:\.\d+)?)\s*cm/i);if(H)v.H=H;const V=n(/\bV[^\d\n]*?(\d+(?:\.\d+)?)\s*cm/i);if(V)v.V=V;const D=n(/\bD[^\d\n]*?(\d+(?:\.\d+)?)\s*cm/i);if(D)v.D=D;const A=n(/\bA[^\d\n]*?(\d+(?:\.\d+)?)\s*°/i);if(A!==null)v.A=A;vals=v; }
    else if(m==="MMC") { autoFillMMC(text); return 1; }

  const analyzePhoto=async(url,m)=>{
    if(!m)return;
    setAiLoad(true);
    try{
      const comp=await compress(url);
      const b64=comp.split(",")[1];
      const r=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({imageBase64:b64,mediaType:"image/jpeg",method:m})});

      setAutoFilled(filled > 0);

    setAiLoad(false);
  };

  // Analizar TODAS las fotos y consolidar
  const analyzeAll = async (m) => {
    if(!m || photos.length===0) return;
    setAiLoad(true); setAiMsg(p=>({...p,[m]:""}));
    try {
      const results = [];
      for(let i=0; i<photos.length; i++){
        const comp = await compress(photos[i].url);
        const b64 = comp.split(",")[1];
        const r = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({imageBase64:b64,mediaType:"image/jpeg",method:m})});
        const d = await r.json();
        results.push(`📸 ${photos[i].label}:\n${d.result||d.error}`);
      }
      // Segunda llamada para consolidar
      const consolidateRes = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          imageBase64: (await compress(photos[0].url)).split(",")[1],
          mediaType:"image/jpeg",
          method:m,
          extraPrompt:`Tienes ${results.length} análisis de distintas vistas del mismo trabajador:\n\n${results.join("\n\n---\n\n")}\n\nConsolida en UN SOLO análisis ${m} definitivo con los valores más precisos considerando todas las vistas. Da la puntuación final consolidada.`
        })});
      const cd = await consolidateRes.json();
      const finalText = results.length > 1
        ? `✅ ANÁLISIS CONSOLIDADO (${photos.length} fotos)\n${"─".repeat(40)}\n${cd.result||cd.error}\n\n${"─".repeat(40)}\n📋 DETALLE POR FOTO:\n\n${results.join("\n\n")}`
        : results[0];
      setAiMsg(p=>({...p,[m]:finalText}));
      autoFill(cd.result||"", m);
      setAutoFilled(true);
    }catch(e){setAiMsg(p=>({...p,[m]:"Error de conexión."}));}
    setAiLoad(false);
  };

  const getRes=()=>{
    const r={};
    if(info.metodos.includes("REBA"))r.REBA=calcReba(reba);
    if(info.metodos.includes("RULA"))r.RULA=calcRula(rula);
    if(info.metodos.includes("OWAS")){const code=`${owas.back}${owas.arms}${owas.legs}${owas.load}`;const cat=owasT[code]??2;r.OWAS={code,cat,level:cat-1,action:owasAct[cat-1]};}
    if(info.metodos.includes("NIOSH"))r.NIOSH=calcNiosh(niosh);
    if(info.metodos.includes("MMC"))r.MMC=calcMMC(mmc, info.sexo||"masculino");
    return r;
  };

  const wrap=ch=>(
    <div style={{minHeight:"100vh",background:C.bg,padding:20,maxWidth:900,margin:"0 auto"}}>
      <Header/><Bar step={step}/>{ch}
    </div>

  const inpStyle={width:"100%",padding:"9px 12px",border:`1px solid ${C.cardBorder}`,borderRadius:8,background:C.input,fontSize:13,color:C.text,boxSizing:"border-box"};

  // STEP 0
  if(step===0)return wrap(
    <Card title="📋 Datos del Puesto de Trabajo">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[["empresa","Empresa / Cliente"],["trabajador","Trabajador"],["dni","DNI"],["cargo","Cargo"],["puesto","Puesto de Trabajo"],["area","Área / Sección"],["tarea","Tarea Evaluada"],["evaluador","Evaluador"]].map(([k,l])=>(
          <div key={k}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>{l}</div>
            <input value={info[k]} onChange={e=>setInfo(p=>({...p,[k]:e.target.value}))} style={inpStyle}/>
          </div>

        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>Sexo</div>
          <select value={info.sexo} onChange={e=>setInfo(p=>({...p,sexo:e.target.value}))} style={inpStyle}>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>Fecha</div>
          <input type="date" value={info.fecha} onChange={e=>setInfo(p=>({...p,fecha:e.target.value}))} style={inpStyle}/>
        </div>
      </div>
      <div style={{marginTop:14}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>Métodos a aplicar:</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {METHODS.map(m=>{const a=info.metodos.includes(m);return(
            <button key={m} onClick={()=>toggleM(m)} style={{padding:"8px 20px",border:`2px solid ${a?C.orange:C.cardBorder}`,borderRadius:24,
              background:a?`linear-gradient(135deg,${C.orange},${C.orangeBtn})`:"white",
              fontWeight:700,fontSize:14,cursor:"pointer",color:a?"white":C.textMid,
              boxShadow:a?"0 3px 10px rgba(210,105,30,0.3)":"none"}}>
              {m}{m==="MMC"&&" ⚖️"}
            </button>
          );})}
        </div>
      </div>
      <Nav onNext={()=>setStep(1)} nextLabel="Siguiente: Fotos →" disabled={!info.empresa||!info.metodos.length}/>
    </Card>
  );

  // STEP 1
  if(step===1)return wrap(
    <Card title="📸 Fotografías del Puesto de Trabajo">
      <p style={{color:C.muted,fontSize:13,marginBottom:14}}>Sube fotos del trabajador — la IA las analizará automáticamente al hacer clic.</p>
      <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${C.orange}88`,borderRadius:12,
        padding:"32px 20px",textAlign:"center",cursor:"pointer",background:"#FFF8F2",marginBottom:14}}>
        <div style={{fontSize:36,marginBottom:8}}>📷</div>
        <div style={{fontWeight:700,color:C.orange,fontSize:15}}>Subir fotos del trabajador</div>

        onChange={e=>Array.from(e.target.files).forEach((f,i)=>{const r=new FileReader();r.onload=ev=>setPhotos(p=>[...p,{url:ev.target.result,name:f.name,label:["Lateral","Anterior","Posterior","Adicional "+(i+1)][Math.min(i,3)]}]);r.readAsDataURL(f);})}/>
      {photos.length>0&&(

  // STEP 2
  if(step===2)return wrap(

          {photos.length>0?(

                disabled={aiLoad}
                style={{width:"100%",padding:"14px",marginBottom:14,
                  background:aiLoad?C.muted:`linear-gradient(135deg,${C.header},${C.orange})`,

              </button>

          {/* Panel de revisión post-IA */}

                🔍 Revisión de valores detectados — {method}
                {method==="REBA" && mmc.peso>0 && info.metodos.includes("MMC") && (
                  <span style={{marginLeft:10,fontSize:11,background:"rgba(255,255,255,0.2)",padding:"2px 8px",borderRadius:6}}>
                    Carga integrada desde MMC: {mmc.peso}kg

                    </span>

                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8,marginBottom:14}}>

                    const isBool = typeof v==="boolean";

                      <div key={k} style={{background:"white",border:`1px solid ${C.cardBorder}`,borderRadius:8,padding:"8px 10px"}}>

                        {isBool ? (
                          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13}}>
                            <input type="checkbox" checked={v} onChange={e=>setReviewData(rd=>({...rd,vals:{...rd.vals,[k]:e.target.checked}}))}/> {v?"Sí":"No"}
                          </label>
                        ) : (
                          <input type="number" value={v} onChange={e=>setReviewData(rd=>({...rd,vals:{...rd.vals,[k]:+e.target.value}}))}
                            style={{width:"100%",padding:"4px 8px",border:`1px solid ${C.cardBorder}`,borderRadius:6,fontSize:14,fontWeight:700,color:C.orange,background:C.input}}/>
                        )}
                      </div>
                    );
                  })}
                </div>
                {/* Desglose score REBA si aplica */}
                {method==="REBA"&&(()=>{
                  const preview = calcReba({...reba,...reviewData.vals});
                  const nivel = NORMA.rebaRiesgo.find(r=>preview.fin<=r.max)||NORMA.rebaRiesgo[4];
                  return (
                    <div style={{background:C.r[preview.level]+"15",border:`1.5px solid ${C.r[preview.level]}`,borderRadius:10,padding:12,marginBottom:12}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.r[preview.level],marginBottom:6}}>Vista previa del score REBA con estos valores:</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,fontSize:12}}>
                        <div style={{textAlign:"center",background:"white",borderRadius:6,padding:6}}><div style={{color:C.muted,fontSize:10}}>GRUPO A</div><div style={{fontWeight:800,fontSize:18,color:C.orange}}>{preview.sA}</div></div>
                        <div style={{textAlign:"center",background:"white",borderRadius:6,padding:6}}><div style={{color:C.muted,fontSize:10}}>GRUPO B</div><div style={{fontWeight:800,fontSize:18,color:C.orange}}>{preview.sB}</div></div>
                        <div style={{textAlign:"center",background:"white",borderRadius:6,padding:6}}><div style={{color:C.muted,fontSize:10}}>TABLA C</div><div style={{fontWeight:800,fontSize:18,color:C.orange}}>{preview.sC}</div></div>
                        <div style={{textAlign:"center",background:C.r[preview.level],borderRadius:6,padding:6}}><div style={{color:"rgba(255,255,255,0.8)",fontSize:10}}>FINAL</div><div style={{fontWeight:800,fontSize:18,color:"white"}}>{preview.fin}/15</div></div>
                      </div>
                      <div style={{marginTop:8,fontSize:12,fontWeight:700,color:C.r[preview.level]}}>
                        Nivel: {nivel.nivel} — {nivel.accion}
                      </div>
                    </div>
                  );
                })()}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={confirmReview}
                    style={{flex:1,padding:"11px",background:`linear-gradient(135deg,${C.header},${C.orange})`,
                      color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                    ✅ Aplicar valores al formulario
                  </button>
                  <button onClick={()=>setReviewData(null)}
                    style={{padding:"11px 16px",background:"white",color:C.muted,border:`1px solid ${C.cardBorder}`,borderRadius:10,fontWeight:600,cursor:"pointer"}}>
                    Cancelar
                  </button>
                </div>
              </div>
            </div>
          )}
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"10px 14px",
              background:"#f0fdf4",border:"1.5px solid #22C55E",borderRadius:8}}>
              <span style={{fontSize:18}}>✅</span>
              <span style={{fontWeight:700,color:"#166534",fontSize:13}}>Valores auto-completados en el formulario — revisa y ajusta si es necesario</span>
            </div>
          )}
          {aiMsg[method]&&(
            <div style={{marginTop:12,borderRadius:12,overflow:"hidden",border:`2px solid ${C.orange}`}}>
              <div style={{background:`linear-gradient(135deg,${C.header},${C.orange})`,color:"white",
                padding:"10px 16px",fontWeight:700,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>🩺 Análisis IA — {method}</span>
                <button onClick={()=>{setAiMsg(p=>({...p,[method]:""}));setAutoFilled(false);}}
                  style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",cursor:"pointer",fontSize:14,borderRadius:6,padding:"2px 8px"}}>✕</button>
              </div>
              <div style={{padding:16,fontSize:12,whiteSpace:"pre-wrap",lineHeight:1.75,
                fontFamily:"monospace",color:C.text,maxHeight:400,overflowY:"auto",background:"#FDFAF6"}}>
                {aiMsg[method]}
              </div>
            </div>
          )}
        </Card>
      )}
      {method==="REBA"&&<REBAPanel s={reba} set={setReba}/>}
      {method==="RULA"&&<RULAPanel s={rula} set={setRula}/>}
      {method==="OWAS"&&<OWASPanel s={owas} set={setOwas}/>}
      {method==="NIOSH"&&<NIOSHPanel s={niosh} set={setNiosh}/>}
      {method==="MMC"&&<MMCPanel s={mmc} set={setMmc}/>}
      {!method&&<div style={{textAlign:"center",padding:50,color:C.muted,background:"white",borderRadius:14,border:`2px dashed ${C.cardBorder}`}}>
        <div style={{fontSize:32,marginBottom:10}}>👆</div>
        <div style={{fontWeight:700,fontSize:15,color:C.textMid}}>Selecciona un método arriba para comenzar</div>
      </div>}
      <Nav onBack={()=>setStep(1)} onNext={()=>setStep(3)} nextLabel="Ver Resultados →"/>
    </div>
  );

  // STEP 3
  const res=getRes();
  if(step===3)return wrap(
    <Card title="📊 Resumen de Riesgo Ergonómico">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {Object.entries(res).map(([m,r])=>(
          <div key={m} style={{background:C.bg,border:`2px solid ${C.r[r.level]}44`,borderRadius:12,padding:16}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:8,color:C.orange}}>{m}</div>
            {m==="REBA"&&<><Badge level={r.level} text={`Score ${r.fin}/15`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>A:{r.sA} B:{r.sB} C:{r.sC}</div></>}
            {m==="RULA"&&<><Badge level={r.level} text={`Score ${r.fin}`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>A:{r.sA} B:{r.sB}</div></>}
            {m==="OWAS"&&<><Badge level={r.level} text={`Cat.${r.cat}·${r.code}`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>{r.action}</div></>}
            {m==="NIOSH"&&<><Badge level={r.level} text={`LI=${r.LI}`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>RWL={r.RWL}kg</div></>}
            {m==="MMC"&&<><Badge level={r.level} text={`${mmc.peso}kg·Lím:${r.limite}kg`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>{+r.exceso>0?`Excede ${r.exceso}kg`:"Dentro del límite"} · {r.nF} factores</div></>}
          </div>
        ))}
      </div>
      <Nav onBack={()=>setStep(2)} onNext={()=>setStep(4)} nextLabel="Generar Informe →"/>
    </Card>
  );

  // STEP 4
  const ri=getRes();
  return wrap(
    <div>
      <div className="no-print" style={{marginBottom:14,display:"flex",gap:8}}>
        <OBtn label="🖨 Imprimir / PDF" onClick={()=>window.print()}/>
        <OBtn label="← Resultados" onClick={()=>setStep(3)} outline/>
      </div>
      <div style={{background:"white",maxWidth:800,margin:"0 auto",padding:32,border:`1px solid ${C.cardBorder}`,borderRadius:16}}>
        <div style={{background:`linear-gradient(135deg,${C.header},${C.orange})`,borderRadius:12,padding:"20px 24px",marginBottom:20,color:"white"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,opacity:0.8,letterSpacing:"1px",textTransform:"uppercase"}}>PANACEA MEDICINA OCUPACIONAL</div>
              <div style={{fontSize:22,fontWeight:800,marginTop:2}}>INFORME ERGONÓMICO</div>
              <div style={{fontSize:12,opacity:0.85,marginTop:4}}>Evaluación de Puesto de Trabajo · {info.fecha}</div>
            </div>
            <div style={{textAlign:"right",fontSize:12,opacity:0.9}}>
              <div>panaceamedocup@gmail.com</div>
              <div>CMP 102517 · RNE 13334</div>
            </div>
          </div>
        </div>
        <div style={{background:C.bg,borderRadius:10,padding:16,marginBottom:20}}>
          <div style={{fontWeight:700,color:C.orange,marginBottom:10,textTransform:"uppercase",fontSize:12}}>Datos del Puesto</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13}}>
            {[["Empresa",info.empresa],["Trabajador",info.trabajador],["DNI",info.dni],["Cargo",info.cargo],["Puesto",info.puesto],["Área",info.area],["Tarea",info.tarea],["Evaluador",info.evaluador]].map(([l,v])=>(
              <div key={l}><span style={{color:C.muted,fontSize:11,fontWeight:600}}>{l.toUpperCase()}: </span><strong>{v||"—"}</strong></div>
            ))}
          </div>
        </div>
        {photos.length>0&&<div style={{marginBottom:20}}>
          <div style={{fontWeight:700,color:C.orange,marginBottom:10,textTransform:"uppercase",fontSize:12}}>Registro Fotográfico</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {photos.map((p,i)=>(
              <div key={i} style={{borderRadius:10,overflow:"hidden",border:`2px solid ${C.cardBorder}`}}>
                <img src={p.url} alt="" style={{width:140,height:110,objectFit:"cover",display:"block"}}/>
                <div style={{background:C.bg,padding:"4px 8px",fontSize:11,color:C.muted,textAlign:"center"}}>{p.label}</div>
              </div>
            ))}
          </div>
        </div>}
        {ri.MMC&&<div style={{border:`2px solid ${C.orange}`,borderRadius:10,padding:16,marginBottom:14,background:"#FFF8F2"}}>
          <div style={{fontWeight:700,color:C.orange,marginBottom:8}}>⚖️ MMC — RM N° 375-2008-TR / ISO 11228-1</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:14,height:14,borderRadius:"50%",background:C.r[ri.MMC.level]}}/>
            <strong style={{color:C.r[ri.MMC.level]}}>{mmc.peso}kg — Límite ({mmc.frec}): {ri.MMC.limite}kg {+ri.MMC.exceso>0?`— EXCEDE ${ri.MMC.exceso}kg`:"— DENTRO DEL LÍMITE"}</strong>
          </div>
          <ul style={{margin:"4px 0 0",paddingLeft:18,fontSize:12}}>
            {(recsDB.MMC[Math.min(ri.MMC.level,recsDB.MMC.length-1)]||[]).map((r,i)=><li key={i}>{r}</li>)}
          </ul>
        </div>}
        {Object.entries(ri).filter(([m])=>m!=="MMC").map(([m,r])=>(
          <div key={m} style={{border:`1px solid ${C.cardBorder}`,borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{fontWeight:700,color:C.orange,marginBottom:6}}>{m}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:14,height:14,borderRadius:"50%",background:C.r[r.level]}}/>
              <strong style={{color:C.r[r.level]}}>
                {m==="REBA"&&`Score ${r.fin}/15 — ${rLabel[r.level]}`}
                {m==="RULA"&&`Score ${r.fin} — ${rLabel[r.level]}`}
                {m==="OWAS"&&`Cat.${r.cat} (${r.code}) — ${r.action}`}
                {m==="NIOSH"&&`LI=${r.LI} (RWL=${r.RWL}kg) — ${rLabel[r.level]}`}
              </strong>
            </div>
            <ul style={{margin:"4px 0 0",paddingLeft:18,fontSize:12}}>
              {(recsDB[m]?.[Math.min(r.level,(recsDB[m]?.length??1)-1)]||[]).map((rec,i)=><li key={i}>{rec}</li>)}
            </ul>
          </div>
        ))}
        <div style={{borderTop:`2px solid ${C.cardBorder}`,paddingTop:16,textAlign:"right"}}>
          <div style={{display:"inline-block",textAlign:"center"}}>
            <div style={{borderTop:`1px solid ${C.text}`,paddingTop:8,width:240}}>
              <div style={{fontWeight:800,fontSize:14}}>{info.evaluador}</div>
              <div style={{fontSize:11,color:C.muted}}>Médico Ocupacional · CMP 102517 · RNE 13334</div>
              <div style={{fontSize:11,color:C.orange,fontWeight:600}}>Panacea Medicina Ocupacional</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
