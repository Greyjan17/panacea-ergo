// ── CÁLCULOS ──────────────────────────────────────────────────────────────
const TA=[[1,2,3,4],[1,2,3,4],[3,3,5,6],[4,4,6,7],[4,4,6,7],[6,6,7,8]];
const TB=[[1,2,2,3,4,5],[2,2,2,3,4,5],[3,3,3,4,5,6],[3,3,3,4,5,6],[4,4,4,5,6,7],[4,4,5,6,7,7],[5,5,6,7,8,8],[5,5,6,7,8,8]];
const TC=[[1,1,1,2,3,3,4,5,6,7,7,7],[1,2,2,3,4,4,5,6,6,7,7,8],[2,3,3,3,4,5,6,7,7,8,8,8],[3,4,4,4,5,6,7,8,8,9,9,9],[4,4,4,5,6,7,8,8,9,9,9,9],[6,6,6,7,8,8,9,9,10,10,10,10],[7,7,7,8,9,9,9,10,10,11,11,11],[8,8,8,9,10,10,10,10,10,11,11,11],[9,9,9,10,10,10,11,11,11,12,12,12],[10,10,10,11,11,11,11,12,12,12,12,12],[11,11,11,11,12,12,12,12,12,12,12,12],[12,12,12,12,12,12,12,12,12,12,12,12]];
function calcReba(s){
  const neck=s.neck+(s.neckT?1:0)+(s.neckS?1:0);
  const trunk=s.trunk+(s.trunkT?1:0)+(s.trunkS?1:0);
  const rA=Math.min(Math.max((trunk-1)*2+(Math.min(neck-1,2)),0),5);
  const sA=Math.min((TA[rA]?.[Math.min(s.legs-1,3)]??6)+s.load+(s.shock?1:0),12);
  const ua=Math.max(s.ua+(s.shr?1:0)+(s.abd?1:0)-(s.sup?1:0),1);
  const sB=Math.min((TB[Math.min((ua-1)*2+Math.min(s.la-1,1),7)]?.[Math.min((s.wrist-1)*2+(s.wristT?1:0),5)]??6)+s.coup,12);
  const sC=TC[Math.min(sA-1,11)]?.[Math.min(sB-1,11)]??12;
  const fin=Math.min(sC+s.act,12);
  return{sA,sB,sC,fin,level:fin<=1?0:fin<=3?1:fin<=7?2:fin<=10?3:4};
}
const OT={"1111":1,"1112":1,"1113":1,"1114":2,"1121":1,"1122":1,"1123":2,"1124":2,"1131":1,"1132":2,"1133":2,"1134":3,"1141":2,"1142":2,"1143":3,"1144":3,"1151":2,"1152":3,"1153":3,"1154":3,"1161":1,"1162":2,"1163":2,"1164":3,"1211":1,"1212":1,"1213":2,"1214":2,"1221":2,"1222":2,"1223":2,"1224":3,"1231":2,"1232":2,"1233":3,"1234":3,"1241":2,"1242":3,"1243":3,"1244":4,"1251":3,"1252":3,"1253":4,"1254":4,"1261":2,"1262":2,"1263":3,"1264":3,"2111":2,"2112":2,"2113":2,"2114":3,"2121":2,"2122":2,"2123":3,"2124":3,"2131":2,"2132":3,"2133":3,"2134":4,"2141":3,"2142":3,"2143":3,"2144":4,"2151":3,"2152":3,"2153":4,"2154":4,"2161":2,"2162":3,"2163":3,"2164":4,"2211":2,"2212":2,"2213":3,"2214":3,"2221":2,"2222":3,"2223":3,"2224":4,"2231":3,"2232":3,"2233":4,"2234":4,"2241":3,"2242":4,"2243":4,"2244":4,"2251":4,"2252":4,"2253":4,"2254":4,"2261":3,"2262":3,"2263":4,"2264":4,"3111":1,"3112":2,"3113":2,"3114":2,"3121":2,"3122":2,"3123":3,"3124":3,"3131":2,"3132":3,"3133":3,"3134":3,"3141":3,"3142":3,"3143":4,"3144":4,"3151":3,"3152":4,"3153":4,"3154":4,"3161":2,"3162":2,"3163":3,"3164":3,"3211":2,"3212":2,"3213":3,"3214":3,"3221":3,"3222":3,"3223":3,"3224":4,"3231":3,"3232":3,"3233":4,"3234":4,"3241":4,"3242":4,"3243":4,"3244":4,"3251":4,"3252":4,"3253":4,"3254":4,"3261":3,"3262":3,"3263":4,"3264":4,"4111":2,"4112":3,"4113":3,"4114":4,"4121":3,"4122":3,"4123":4,"4124":4,"4131":3,"4132":4,"4133":4,"4134":4,"4141":4,"4142":4,"4143":4,"4144":4,"4151":4,"4152":4,"4153":4,"4154":4,"4161":3,"4162":4,"4163":4,"4164":4,"4211":3,"4212":3,"4213":4,"4214":4,"4221":3,"4222":4,"4223":4,"4224":4,"4231":4,"4232":4,"4233":4,"4234":4,"4241":4,"4242":4,"4243":4,"4244":4,"4251":4,"4252":4,"4253":4,"4254":4,"4261":4,"4262":4,"4263":4,"4264":4};
const OA=["Sin acción","Acción en futuro próximo","Acción cuanto antes","Acción INMEDIATA"];
function calcNiosh(s){
  const HM=Math.min(25/Math.max(s.H,1),1);
  const VM=Math.max(1-0.003*Math.abs(s.V-75),0);
  const DM=s.D<25?0.87:Math.min(0.82+4.5/s.D,1);
  const AM=Math.max(1-0.0032*s.A,0);
  const fT={"<1h":[0.85,0.81,0.75,0.65,0.55,0.45,0,0,0,0,0,0,0],"1-2h":[0.95,0.92,0.88,0.84,0.79,0.72,0.6,0.5,0.42,0.35,0.3,0.26,0.23],"2-8h":[1,0.97,0.94,0.91,0.88,0.84,0.8,0.75,0.7,0.6,0.52,0.45,0]};
  const fi=s.F<=0.2?0:s.F<=0.5?1:s.F<=1?2:s.F<=2?3:s.F<=3?4:s.F<=4?5:s.F<=5?6:s.F<=6?7:s.F<=7?8:s.F<=8?9:s.F<=9?10:s.F<=10?11:12;
  const FM=fT[s.dur]?.[fi]??0.45;
  const CM=s.coup==="good"?1:s.coup==="fair"?0.95:0.90;
  const RWL=23*HM*VM*DM*AM*FM*CM;
  const LI=s.L/Math.max(RWL,0.01);
  return{HM,VM,DM,AM,FM,CM,RWL:RWL.toFixed(2),LI:LI.toFixed(2),level:LI<=1?0:LI<=2?1:LI<=3?2:LI<=5?3:4};
}
function calcRula(s){
  const tA=[[[[1,2],[2,2],[2,3],[3,3]],[[2,2],[2,2],[3,3],[3,3]],[[2,3],[3,3],[3,3],[4,4]]],[[[2,3],[3,3],[3,4],[4,4]],[[3,3],[3,3],[3,4],[4,4]],[[3,4],[4,4],[4,4],[5,5]]],[[[3,3],[4,4],[4,4],[5,5]],[[3,4],[4,4],[4,5],[5,5]],[[4,4],[4,4],[4,5],[5,6]]],[[[4,4],[4,4],[4,5],[5,5]],[[4,4],[4,4],[4,5],[5,5]],[[4,5],[5,5],[5,6],[6,7]]],[[[5,5],[5,5],[5,6],[6,7]],[[5,6],[6,6],[6,7],[7,7]],[[6,6],[6,7],[7,7],[7,8]]],[[[7,8],[7,8],[7,8],[8,9]],[[8,9],[8,9],[8,9],[9,9]],[[9,9],[9,9],[9,9],[9,9]]]];
  const ua=Math.max(Math.min(s.ua+(s.shr?1:0)-(s.sup?1:0),6),1);
  const sA=(tA[ua-1]?.[Math.min(s.la+(s.mid?1:0),2)-1]?.[Math.min(s.wrist,3)-1]?.[s.wristT?1:0]??9)+s.mA+s.fA;
  const tB=[[1,3,2,3,3,4,5,5,6,6,7,7],[2,3,2,3,4,5,5,6,6,7,7,7],[3,4,3,4,4,5,6,6,7,7,7,7],[5,5,4,5,5,6,7,7,7,7,8,8],[7,7,5,6,6,7,7,8,8,8,8,8],[8,8,7,7,7,8,8,9,9,9,9,9]];
  const n=Math.min(s.neck+(s.neckT?1:0)+(s.neckS?1:0),6);
  const t=Math.min(s.trunk+(s.trunkT?1:0)+(s.trunkS?1:0),6);
  const sB=(tB[n-1]?.[t+(Math.min(s.legs,2)-1)*6-1]??9)+s.mB+s.fB;
  const tC=[[1,2,3,3,4,5,5],[2,2,3,4,4,5,5],[3,3,3,4,4,5,6],[3,3,3,4,5,6,6],[4,4,4,5,6,7,7],[4,4,5,6,6,7,7],[5,5,6,6,7,7,7],[5,5,6,7,7,7,7]];
  const fin=tC[Math.min(sA-1,7)]?.[Math.min(sB-1,6)]??7;
  return{sA,sB,fin,level:fin<=2?0:fin<=3?1:fin<=4?2:fin<=6?3:4};
}
function calcMMC(s,sexo){
  const sx=sexo==="femenino"?"femenino":"masculino";
  const rm=NORMA.rm375[sx];
  const iso=NORMA.iso.find(x=>x.g===s.grupo)||(sx==="masculino"?NORMA.iso[0]:NORMA.iso[3]);
  const isoLim=s.frec==="ocasional"?iso.o:s.frec==="frecuente"?iso.f:iso.mf;
  // RM 375 es la norma base — define el límite aplicable
  // ISO 11228 es referencia complementaria informativa
  const limAp=rm.general;
  const exc=Math.max(s.peso-limAp,0);
  const pct=limAp>0?((s.peso/limAp-1)*100):0;
  let level=s.peso<=limAp?0:s.peso<=limAp*1.2?1:s.peso<=limAp*1.5?2:s.peso<=limAp*2?3:4;
  const nF=s.factores.length;
  if(nF>=3&&level<2)level=2;
  if(nF>=5&&level<3)level=3;
  return{limRM:rm.general,limEnt:rm.entrenado,limISO:isoLim,limAp,
    exc:exc.toFixed(1),pct:pct.toFixed(0),nF,level,
    cumRM:s.peso<=rm.general,cumISO:s.peso<=isoLim};
}

function RULAPanel({s,set}){

function App(){
  const [step,setStep]=useState(0);
  const [info,setInfo]=useState({
    empresa:"",trabajador:"",dni:"",sexo:"masculino",cargo:"",
    puesto:"",area:"",tarea:"",
    fecha:new Date().toISOString().split("T")[0],
    evaluador:"Dr. Miguel Ochoa Cuadros",metodos:[]
  });
  const [photos,setPhotos]=useState([]);
  const [method,setMethod]=useState(null);
  const [reba,setReba]=useState({neck:1,neckT:false,neckS:false,trunk:1,trunkT:false,trunkS:false,legs:1,load:0,shock:false,ua:1,shr:false,abd:false,sup:false,la:1,wrist:1,wristT:false,coup:0,act:0});
  const [rula,setRula]=useState({ua:1,shr:false,sup:false,la:1,mid:false,wrist:1,wristT:false,mA:0,fA:0,neck:1,neckT:false,neckS:false,trunk:1,trunkT:false,trunkS:false,legs:1,mB:0,fB:0});
  const [owas,setOwas]=useState({back:1,arms:1,legs:1,load:1});
  const [niosh,setNiosh]=useState({L:0,H:25,V:75,D:25,A:0,F:1,dur:"2-8h",coup:"good"});
  const [mmc,setMmc]=useState({peso:0,grupo:"Varón adulto (18-45 años)",frec:"frecuente",form:"no",factores:[]});
  const [aiMsg,setAiMsg]=useState({});
  const [aiLoad,setAiLoad]=useState(false);
  const [activeP,setActiveP]=useState(null);
  const [filled,setFilled]=useState(false);
  const [reviewData,setReviewData]=useState(null);
  const fileRef=useRef();

  // Ajusta grupo MMC cuando cambia el sexo
  useEffect(()=>{
    if(info.sexo==="femenino"&&mmc.grupo.includes("Varón"))
      setMmc(p=>({...p,grupo:"Mujer adulta (18-45 años)"}));
    if(info.sexo==="masculino"&&mmc.grupo.includes("Mujer"))
      setMmc(p=>({...p,grupo:"Varón adulto (18-45 años)"}));
  },[info.sexo]);

  // MMC jala datos directamente del análisis REBA ya realizado
  const propagarREBAaMMC = (rebaVals, rebaText) => {
    const factores = [];
    const add = id => { if(!factores.includes(id)) factores.push(id); };

    // 1. Carga desde REBA → peso estimado en MMC
    // REBA carga 2 = >10kg, pero el peso real lo ingresa el evaluador
    // Solo marcamos el factor si supera el límite RM 375
    const rm = NORMA.rm375[info.sexo==="femenino"?"femenino":"masculino"];

    // 2. Torsión de tronco → factor asimetría MMC
    if(rebaVals.trunkT === true) add("asim");
    if(/torsión.*tronco.*sí|tronco.*torsión.*sí/i.test(rebaText)) add("asim");

    // 3. Acoplamiento malo/inaceptable → agarre deficiente MMC
    if(rebaVals.coup >= 2) add("agr");
    if(/acoplamiento.*[23]/i.test(rebaText)) add("agr");

    // 4. Actividad repetitiva → alta frecuencia MMC
    if(rebaVals.act >= 2) add("freq");
    if(/actividad.*[23]/i.test(rebaText)||/repetitiv|>4.*min/i.test(rebaText)) add("freq");

    // 5. Posición piernas cuclillas/rodilla → altura desfavorable
    if(rebaVals.legs >= 3) add("alt");
    if(/piernas.*[34]/i.test(rebaText)||/cuclillas|rodilla.*tierra|arrodill/i.test(rebaText)) add("alt");

    // 6. Carga >10kg en REBA → marcamos factor peso si supera RM 375
    if(rebaVals.load === 2 && mmc.peso > rm.general) add("peso");

    // 7. Desde texto libre de valoración clínica
    if(/superficie.*inestable|desnivel|irregular/i.test(rebaText)) add("sue");
    if(/sin.*carretilla|sin.*ayuda.*mec|sin.*equipo/i.test(rebaText)) add("eq");
    if(/espacio.*restringido|espacio.*reducido/i.test(rebaText)) add("esp");
    if(/carga.*inestable|irregular.*carga/i.test(rebaText)) add("ines");

    if(factores.length > 0) {
      setMmc(p => ({...p, factores: [...new Set([...p.factores, ...factores])]}));
    }
    return factores.length;
  };

  const toggleM=m=>setInfo(p=>({...p,
    metodos:p.metodos.includes(m)?p.metodos.filter(x=>x!==m):[...p.metodos,m]
  }));

  const compress=url=>new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let{width:w,height:h}=img;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.75));
    };
    img.src=url;
  });

  const doAnalyze=async(url,m)=>{
    const comp=await compress(url);
    const r=await fetch(WORKER,{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({imageBase64:comp.split(",")[1],mediaType:"image/jpeg",method:m})
    });
    const d=await r.json();
    return d.result||d.error||"Sin respuesta.";
  };

  const analyzeOne=async(url,m)=>{
    if(!m)return;
    setAiLoad(true);setFilled(false);
    try{
      const txt=await doAnalyze(url,m);
      setAiMsg(p=>({...p,[m]:txt}));
      parseAndReview(txt,m);
    }catch(e){setAiMsg(p=>({...p,[m]:"Error de conexión."}));}
    setAiLoad(false);
  };

  const analyzeAll=async(m)=>{
    if(!m||!photos.length)return;
    setAiLoad(true);setFilled(false);setAiMsg(p=>({...p,[m]:""}));
    try{
      const results=[];
      for(let i=0;i<photos.length;i++){
        const txt=await doAnalyze(photos[i].url,m);
        results.push(`📸 ${photos[i].label}:\n${txt}`);
      }
      const final=results.length===1?results[0]
        :`✅ ANÁLISIS CONSOLIDADO (${results.length} fotos)\n${"─".repeat(40)}\n${results.join("\n\n─────\n\n")}`;
      setAiMsg(p=>({...p,[m]:final}));
      parseAndReview(results[0],m);
    }catch(e){setAiMsg(p=>({...p,[m]:"Error de conexión."}));}
    setAiLoad(false);
  };

  const parseAndReview=(txt,m)=>{
    const n=pat=>{const x=txt.match(pat);return x?parseInt(x[1]):null;};
    const b=pat=>{const x=txt.match(pat);return x?/sí|si|yes/i.test(x[1]):null;};
    let vals={};
    if(m==="REBA"){
      const neck=n(/CUELLO[^:\n]*:\s*\[?(\d)/i);if(neck)vals.neck=Math.min(neck,2);
      const trunk=n(/TRONCO[^:\n]*:\s*\[?(\d)/i);if(trunk)vals.trunk=Math.min(trunk,4);
      const legs=n(/PIERNAS[^:\n]*:\s*\[?(\d)/i);if(legs)vals.legs=Math.min(legs,4);
      const ua=n(/BRAZO SUPERIOR[^:\n]*:\s*\[?(\d)/i);if(ua)vals.ua=Math.min(ua,4);
      const la=n(/BRAZO INFERIOR[^:\n]*:\s*\[?(\d)/i);if(la)vals.la=Math.min(la,2);
      const wrist=n(/MU[ÑN]ECA[^:\n]*:\s*\[?(\d)/i);if(wrist)vals.wrist=Math.min(wrist,2);
      const coup=n(/ACOPLAMIENTO[^:\n]*:\s*\[?(\d)/i);if(coup!==null)vals.coup=Math.min(coup,3);
      const act=n(/ACTIVIDAD[^:\n]*:\s*\[?(\d)/i);if(act!==null)vals.act=Math.min(act,3);
      const kg=txt.match(/(?:carga|peso)[^:.\n]*?(\d+(?:\.\d+)?)\s*kg/i);
      if(kg){const p=parseFloat(kg[1]);vals.load=p<5?0:p<=10?1:2;}
      const neckT=b(/[Tt]orsión[^:\n]*cuello[^:\n]*:\s*(sí|si|no)/i);if(neckT!==null)vals.neckT=neckT;
      const trunkT=b(/[Tt]orsión[^:\n]*tronco[^:\n]*:\s*(sí|si|no)/i);if(trunkT!==null)vals.trunkT=trunkT;
      const wristT=b(/[Tt]orsión[^:\n]*mu[ñn]eca[^:\n]*:\s*(sí|si|no)/i);if(wristT!==null)vals.wristT=wristT;
      const shr=b(/[Hh]ombro elevado[^:\n]*:\s*(sí|si|no)/i);if(shr!==null)vals.shr=shr;
    } else if(m==="RULA"){
      const ua=n(/BRAZO SUPERIOR[^:\n]*:\s*\[?(\d)/i);if(ua)vals.ua=Math.min(ua,4);
      const la=n(/BRAZO INFERIOR[^:\n]*:\s*\[?(\d)/i);if(la)vals.la=Math.min(la,2);
      const wrist=n(/MU[ÑN]ECA[^:\n]*:\s*\[?(\d)/i);if(wrist)vals.wrist=Math.min(wrist,3);
      const neck=n(/CUELLO[^:\n]*:\s*\[?(\d)/i);if(neck)vals.neck=Math.min(neck,4);
      const trunk=n(/TRONCO[^:\n]*:\s*\[?(\d)/i);if(trunk)vals.trunk=Math.min(trunk,4);
    } else if(m==="OWAS"){
      const bk=n(/ESPALDA[^:\n]*:\s*\[?(\d)/i);if(bk)vals.back=Math.min(bk,4);
      const ar=n(/BRAZOS[^:\n]*:\s*\[?(\d)/i);if(ar)vals.arms=Math.min(ar,3);
      const lg=n(/PIERNAS[^:\n]*:\s*\[?(\d)/i);if(lg)vals.legs=Math.min(lg,7);
      const ld=n(/CARGA[^:\n]*:\s*\[?(\d)/i);if(ld)vals.load=Math.min(ld,3);
    } else if(m==="NIOSH"){
      const H=txt.match(/\bH[^\d\n]*?(\d+(?:\.\d+)?)\s*cm/i);if(H)vals.H=parseFloat(H[1]);
      const V=txt.match(/\bV[^\d\n]*?(\d+(?:\.\d+)?)\s*cm/i);if(V)vals.V=parseFloat(V[1]);
      const D=txt.match(/\bD[^\d\n]*?(\d+(?:\.\d+)?)\s*cm/i);if(D)vals.D=parseFloat(D[1]);
    } else if(m==="MMC"){
      // Factores MMC desde texto libre
      const f=[];
      if(/torsi[oó]n.*tronco/i.test(txt))f.push("asim");
      if(/agarre.*deficiente|agarre.*malo|sin asa/i.test(txt))f.push("agr");
      if(/encima.*hombro|bajo.*rodilla|nivel del suelo/i.test(txt))f.push("alt");
      if(/alta frecuencia|>4.*min|repetitiv/i.test(txt))f.push("freq");
      if(/sin.*ayuda.*mec|sin.*carretilla/i.test(txt))f.push("eq");
      if(/superficie.*inestable/i.test(txt))f.push("sue");
      if(/carga.*inestable/i.test(txt))f.push("ines");
      if(/espacio.*restringido/i.test(txt))f.push("esp");
      if(f.length>0)setMmc(p=>({...p,factores:[...new Set([...p.factores,...f])]}));
      setFilled(true);
      return;
    }
    if(Object.keys(vals).length>0) setReviewData({method:m,vals});
  };

  const confirmReview=()=>{
    if(!reviewData)return;
    const {method:m, vals} = reviewData;

    // Aplica al método confirmado
    if(m==="REBA") setReba(p=>({...p,...vals}));
    else if(m==="RULA") setRula(p=>({...p,...vals}));
    else if(m==="OWAS") setOwas(p=>({...p,...vals}));
    else if(m==="NIOSH") setNiosh(p=>({...p,...vals}));

    const has = x => info.metodos.includes(x);

    // ── REBA → propaga a otros ──────────────────────────────────────────
    if(m==="REBA"){
      // REBA → RULA: cuello, tronco, piernas, brazos (segmentos comunes)
      if(has("RULA")) setRula(p=>({...p,
        neck:  vals.neck  ?? p.neck,
        neckT: vals.neckT ?? p.neckT,
        neckS: vals.neckS ?? p.neckS,
        trunk: vals.trunk ?? p.trunk,
        trunkT:vals.trunkT?? p.trunkT,
        trunkS:vals.trunkS?? p.trunkS,
        ua:    vals.ua    ?? p.ua,
        la:    vals.la    ?? p.la,
        shr:   vals.shr   ?? p.shr,
        sup:   vals.sup   ?? p.sup,
        wristT:vals.wristT?? p.wristT,
      }));

      // REBA → OWAS: tronco→espalda, brazos→brazos, piernas→piernas, carga→carga
      if(has("OWAS")) setOwas(p=>({...p,
        back: vals.trunk ? Math.min(vals.trunk, 4) : p.back,
        arms: vals.ua ? (vals.ua >= 3 ? 2 : 1) : p.arms,  // brazo >45° = uno sobre hombros
        legs: vals.legs ?? p.legs,
        load: vals.load !== undefined ? Math.max(1, vals.load) : p.load, // REBA 0→1 en OWAS
      }));

      // REBA → NIOSH: carga como peso L
      if(has("NIOSH") && vals.load === 2){
        // Solo marca que hay carga pesada, el evaluador confirma el valor exacto
        setNiosh(p=>({...p, coup: vals.coup>=2?"poor":vals.coup===1?"fair":"good"}));
      }

      // REBA → MMC
      if(has("MMC")) propagarREBAaMMC(vals, aiMsg.REBA||"");
    }

    // ── RULA → propaga a otros ──────────────────────────────────────────
    else if(m==="RULA"){
      // RULA → REBA: segmentos comunes
      if(has("REBA")) setReba(p=>({...p,
        neck:  vals.neck  ?? p.neck,
        neckT: vals.neckT ?? p.neckT,
        neckS: vals.neckS ?? p.neckS,
        trunk: vals.trunk ?? p.trunk,
        trunkT:vals.trunkT?? p.trunkT,
        trunkS:vals.trunkS?? p.trunkS,
        ua:    vals.ua    ?? p.ua,
        la:    vals.la    ?? p.la,
        shr:   vals.shr   ?? p.shr,
        wristT:vals.wristT?? p.wristT,
      }));

      // RULA → OWAS
      if(has("OWAS")) setOwas(p=>({...p,
        back: vals.trunk ? Math.min(vals.trunk, 4) : p.back,
        arms: vals.ua ? (vals.ua >= 3 ? 2 : 1) : p.arms,
        legs: vals.legs ?? p.legs,
      }));

      // RULA → MMC: torsión, frecuencia
      if(has("MMC")){
        const f=[];
        if(vals.trunkT) f.push("asim");
        if(vals.fA >= 2 || vals.fB >= 2) f.push("agr");
        if(vals.mA >= 1 || vals.mB >= 1) f.push("freq");
        if(f.length>0) setMmc(p=>({...p,factores:[...new Set([...p.factores,...f])]}));
      }
    }

    // ── OWAS → propaga a otros ──────────────────────────────────────────
    else if(m==="OWAS"){
      // OWAS espalda → tronco REBA/RULA
      const trunkFromOwas = vals.back ?? null;
      const legsFromOwas  = vals.legs ?? null;
      // OWAS brazos: 1=bajo hombros→ua=1-2, 2=uno sobre→ua=3, 3=ambos→ua=4
      const uaFromOwas = vals.arms===3?4:vals.arms===2?3:2;
      // OWAS carga: 1→load=0-1, 2→load=1, 3→load=2
      const loadFromOwas = vals.load===3?2:vals.load===2?1:0;

      if(has("REBA")) setReba(p=>({...p,
        trunk: trunkFromOwas ?? p.trunk,
        legs:  legsFromOwas  ?? p.legs,
        ua:    vals.arms ? uaFromOwas : p.ua,
        load:  vals.load !== undefined ? loadFromOwas : p.load,
      }));

      if(has("RULA")) setRula(p=>({...p,
        trunk: trunkFromOwas ?? p.trunk,
        legs:  legsFromOwas ? Math.min(legsFromOwas, 2) : p.legs,
        ua:    vals.arms ? uaFromOwas : p.ua,
      }));

      // OWAS → MMC
      if(has("MMC")){
        const f=[];
        if(vals.back >= 3) f.push("asim");   // espalda girada = torsión
        if(vals.arms >= 2) f.push("alt");    // brazos sobre hombros = postura desfavorable
        if(vals.load === 3) f.push("peso");  // >20kg
        if(vals.legs <= 1 || vals.legs >= 4) f.push("alt"); // sentado o cuclillas
        if(f.length>0) setMmc(p=>({...p,factores:[...new Set([...p.factores,...f])]}));
      }
    }

    // ── NIOSH → propaga a MMC ───────────────────────────────────────────
    else if(m==="NIOSH"){
      if(has("MMC")){
        const f=[];
        if(vals.H && vals.H > 50) f.push("dist");
        if(vals.A && vals.A > 30) f.push("asim");
        if(vals.V && (vals.V < 30 || vals.V > 150)) f.push("alt");
        if(f.length>0) setMmc(p=>({...p,factores:[...new Set([...p.factores,...f])]}));
      }
    }

    setFilled(true);
    setReviewData(null);
  };

  const getRes=()=>{
    const r={};
    if(info.metodos.includes("REBA"))r.REBA=calcReba(reba);
    if(info.metodos.includes("RULA"))r.RULA=calcRula(rula);
    if(info.metodos.includes("OWAS")){
      const code=`${owas.back}${owas.arms}${owas.legs}${owas.load}`;
      const cat=OT[code]??2;
      r.OWAS={code,cat,level:cat-1,action:OA[cat-1]};
    }
    if(info.metodos.includes("NIOSH"))r.NIOSH=calcNiosh(niosh);
    if(info.metodos.includes("MMC"))r.MMC=calcMMC(mmc,info.sexo||"masculino");
    return r;
  };

  const IS={width:"100%",padding:"9px 12px",border:`1px solid ${C.cb}`,
    borderRadius:8,background:C.inp,fontSize:13,color:C.text,boxSizing:"border-box"};

  const wrap=ch=>(
    <div style={{minHeight:"100vh",background:C.bg,padding:20,maxWidth:900,margin:"0 auto"}}>
      <Header/><Bar step={step}/>{ch}
    </div>
  );

  // STEP 0
  if(step===0)return wrap(
    <Card title="📋 Datos del Puesto de Trabajo">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[["empresa","Empresa / Cliente"],["trabajador","Trabajador"],["dni","DNI"],["cargo","Cargo"],["puesto","Puesto de Trabajo"],["area","Área / Sección"],["tarea","Tarea Evaluada"],["evaluador","Evaluador"]].map(([k,l])=>(
          <div key={k}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>{l}</div>
            <input value={info[k]} onChange={e=>setInfo(p=>({...p,[k]:e.target.value}))} style={IS}/>
          </div>
        ))}
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>Sexo</div>
          <select value={info.sexo} onChange={e=>setInfo(p=>({...p,sexo:e.target.value}))} style={IS}>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:3,fontWeight:600}}>Fecha</div>
          <input type="date" value={info.fecha} onChange={e=>setInfo(p=>({...p,fecha:e.target.value}))} style={IS}/>
        </div>
      </div>
      <div style={{marginTop:14}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>Métodos:</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {METHODS.map(m=>{const a=info.metodos.includes(m);return(
            <button key={m} onClick={()=>toggleM(m)} style={{padding:"8px 20px",
              border:`2px solid ${a?C.orange:C.cb}`,borderRadius:24,
              background:a?`linear-gradient(135deg,${C.orange},${C.ob})`:"white",
              fontWeight:700,fontSize:14,cursor:"pointer",color:a?"white":C.mid,
              boxShadow:a?"0 3px 10px rgba(210,105,30,0.3)":"none"}}>
              {m}{m==="MMC"?" ⚖️":""}
            </button>
          );})}
        </div>
      </div>
      <Nav onNext={()=>setStep(1)} nextLabel="Siguiente: Fotos →"
        disabled={!info.empresa||!info.metodos.length}/>
    </Card>
  );

  // STEP 1
  if(step===1)return wrap(
    <Card title="📸 Fotografías del Puesto">
      <p style={{color:C.muted,fontSize:13,marginBottom:14}}>
        Sube fotos del trabajador — la IA las analizará automáticamente.
      </p>
      <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${C.orange}88`,
        borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",
        background:"#FFF8F2",marginBottom:14}}>
        <div style={{fontSize:36,marginBottom:8}}>📷</div>
        <div style={{fontWeight:700,color:C.orange,fontSize:15}}>Subir fotos del trabajador</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>Lateral · Anterior · Posterior · JPG PNG WEBP</div>
      </div>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
        onChange={e=>Array.from(e.target.files).forEach((f,i)=>{
          const r=new FileReader();
          r.onload=ev=>setPhotos(p=>[...p,{
            url:ev.target.result,name:f.name,
            label:["Lateral","Anterior","Posterior","Adicional "+(i+1)][Math.min(i,3)]
          }]);
          r.readAsDataURL(f);
        })}/>
      {photos.length>0&&(
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {photos.map((p,i)=>(
            <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",
              border:`3px solid ${C.orange}`}}>
              <img src={p.url} alt="" style={{width:120,height:120,objectFit:"cover",display:"block"}}/>
              <div style={{background:"rgba(139,69,19,0.85)",padding:"4px 8px",
                fontSize:11,color:"white",fontWeight:700,textAlign:"center"}}>{p.label}</div>
              <button onClick={()=>setPhotos(ph=>ph.filter((_,j)=>j!==i))}
                style={{position:"absolute",top:6,right:6,width:22,height:22,
                  borderRadius:"50%",background:"#EF4444",border:"none",
                  color:"white",fontWeight:700,cursor:"pointer",fontSize:13}}>×</button>
            </div>
          ))}
        </div>
      )}
      <Nav onBack={()=>setStep(0)} onNext={()=>setStep(2)} nextLabel="Siguiente: Evaluación →"/>
    </Card>
  );

  // STEP 2
  if(step===2){
    const res=getRes();
    return wrap(
      <div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
          {info.metodos.map(m=>(
            <button key={m} onClick={()=>{setMethod(m);setFilled(false);setReviewData(null);}}
              style={{padding:"10px 22px",border:`2px solid ${method===m?C.orange:C.cb}`,
                borderRadius:24,fontWeight:700,fontSize:14,cursor:"pointer",
                background:method===m?`linear-gradient(135deg,${C.orange},${C.ob})`:"white",
                color:method===m?"white":C.mid,
                boxShadow:method===m?"0 3px 12px rgba(210,105,30,0.35)":"none"}}>
              {m}
            </button>
          ))}
        </div>

        {method&&(
          <Card title={`🤖 Análisis IA — ${method}`}>
            {photos.length>0?(
              <div>
                <button onClick={()=>analyzeAll(method)} disabled={aiLoad}
                  style={{width:"100%",padding:"14px",marginBottom:12,
                    background:aiLoad?C.muted:`linear-gradient(135deg,${C.header},${C.orange})`,
                    color:"white",border:"none",borderRadius:12,
                    cursor:aiLoad?"not-allowed":"pointer",
                    fontWeight:800,fontSize:16,
                    boxShadow:aiLoad?"none":"0 4px 15px rgba(139,69,19,0.4)"}}>
                  {aiLoad?`⏳ Analizando ${photos.length} foto(s)...`
                    :`✦ Analizar todas las fotos con IA (${photos.length}) →`}
                </button>
                <div style={{fontSize:11,color:C.muted,marginBottom:8}}>O clic en una foto individual:</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {photos.map((p,i)=>(
                    <div key={i} onClick={()=>{if(!aiLoad){setActiveP(i);analyzeOne(p.url,method);}}}
                      style={{cursor:aiLoad?"not-allowed":"pointer",borderRadius:8,overflow:"hidden",
                        border:`3px solid ${activeP===i?C.orange:C.cb}`,opacity:aiLoad?0.6:1}}>
                      <img src={p.url} alt="" style={{width:72,height:72,objectFit:"cover",display:"block"}}/>
                      <div style={{background:activeP===i?C.orange:"rgba(0,0,0,0.55)",
                        color:"white",fontSize:10,padding:"2px 0",textAlign:"center",fontWeight:700}}>
                        {p.label}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ):(
              <div style={{padding:"14px",background:"#FFF8F2",
                border:`1px dashed ${C.orange}`,borderRadius:10,fontSize:13,color:C.orange}}>
                📷 Vuelve al Paso 2 y sube fotos para activar el análisis IA.
              </div>
            )}

            {aiLoad&&(
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:12,
                padding:"12px 16px",background:`${C.orange}11`,
                border:`1px solid ${C.orange}44`,borderRadius:10}}>
                <span style={{fontSize:20}}>🔬</span>
                <div>
                  <div style={{fontWeight:700,color:C.orange}}>Analizando con IA — {method}...</div>
                  <div style={{fontSize:11,color:C.muted}}>Procesando análisis biomecánico</div>
                </div>
              </div>
            )}

            {reviewData&&reviewData.method===method&&(
              <div style={{marginTop:12,borderRadius:12,overflow:"hidden",
                border:`2px solid ${C.orange}`,background:"#FFFAF5"}}>
                <div style={{background:`linear-gradient(135deg,${C.header},${C.orange})`,
                  color:"white",padding:"10px 16px",fontWeight:700,fontSize:13}}>
                  🔍 Revisar valores detectados — confirma antes de aplicar
                </div>
                <div style={{padding:14}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8,marginBottom:12}}>
                    {Object.entries(reviewData.vals).map(([k,v])=>{
                      const LBL={neck:"Cuello",trunk:"Tronco",legs:"Piernas",load:"Carga",ua:"Brazo Sup",la:"Brazo Inf",wrist:"Muñeca",coup:"Acopl.",act:"Actividad",neckT:"Torsión cuello",trunkT:"Torsión tronco",wristT:"Torsión muñeca",shr:"Hombro elev.",back:"Espalda",arms:"Brazos",H:"H (cm)",V:"V (cm)",D:"D (cm)"};
                      const isBool=typeof v==="boolean";
                      return(
                        <div key={k} style={{background:"white",border:`1px solid ${C.cb}`,borderRadius:8,padding:"8px 10px"}}>
                          <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{LBL[k]||k}</div>
                          {isBool?(
                            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13}}>
                              <input type="checkbox" checked={v}
                                onChange={e=>setReviewData(rd=>({...rd,vals:{...rd.vals,[k]:e.target.checked}}))}/>
                              {v?"Sí":"No"}
                            </label>
                          ):(
                            <input type="number" value={v}
                              onChange={e=>setReviewData(rd=>({...rd,vals:{...rd.vals,[k]:+e.target.value}}))}
                              style={{width:"100%",padding:"4px 8px",border:`1px solid ${C.cb}`,
                                borderRadius:6,fontSize:14,fontWeight:700,color:C.orange,background:C.inp}}/>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  {method==="REBA"&&(()=>{
                    const prev=calcReba({...reba,...reviewData.vals});
                    const niv=NORMA.rebaRiesgo.find(x=>prev.fin<=x.max)||NORMA.rebaRiesgo[4];
                    return(
                      <div style={{background:C.r[prev.level]+"15",border:`1.5px solid ${C.r[prev.level]}`,
                        borderRadius:10,padding:12,marginBottom:12}}>
                        <div style={{fontWeight:700,fontSize:13,color:C.r[prev.level],marginBottom:6}}>
                          Vista previa con estos valores:
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,fontSize:12}}>
                          {[["GRUPO A",prev.sA],["GRUPO B",prev.sB],["TABLA C",prev.sC],["FINAL",`${prev.fin}/15`]].map(([l,v],i)=>(
                            <div key={i} style={{textAlign:"center",background:i===3?C.r[prev.level]:"white",
                              borderRadius:6,padding:6,color:i===3?"white":C.text}}>
                              <div style={{fontSize:10,opacity:0.7}}>{l}</div>
                              <div style={{fontWeight:800,fontSize:18}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{marginTop:8,fontSize:12,fontWeight:700,color:C.r[prev.level]}}>
                          {niv.nivel} — {niv.accion}
                        </div>
                      </div>
                    );
                  })()}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={confirmReview}
                      style={{flex:1,padding:"11px",
                        background:`linear-gradient(135deg,${C.header},${C.orange})`,
                        color:"white",border:"none",borderRadius:10,fontWeight:700,
                        fontSize:14,cursor:"pointer"}}>
                      ✅ Aplicar al formulario
                    </button>
                    <button onClick={()=>setReviewData(null)}
                      style={{padding:"11px 16px",background:"white",color:C.muted,
                        border:`1px solid ${C.cb}`,borderRadius:10,fontWeight:600,cursor:"pointer"}}>
                      Cancelar
                    </button>
                  </div>
                </div>
              </div>
            )}

            {filled&&!reviewData&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"10px 14px",
                background:"#f0fdf4",border:"1.5px solid #22C55E",borderRadius:8}}>
                <span style={{fontSize:18}}>✅</span>
                <span style={{fontWeight:700,color:"#166534",fontSize:13}}>
                  Valores aplicados al formulario — revisa y ajusta si es necesario
                </span>
              </div>
            )}

            {aiMsg[method]&&(
              <div style={{marginTop:12,borderRadius:12,overflow:"hidden",border:`2px solid ${C.orange}`}}>
                <div style={{background:`linear-gradient(135deg,${C.header},${C.orange})`,
                  color:"white",padding:"10px 16px",fontWeight:700,fontSize:13,
                  display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>🩺 Análisis IA — {method}</span>
                  <button onClick={()=>setAiMsg(p=>({...p,[method]:""}))}
                    style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",
                      cursor:"pointer",fontSize:14,borderRadius:6,padding:"2px 8px"}}>✕</button>
                </div>
                <div style={{padding:16,fontSize:12,whiteSpace:"pre-wrap",lineHeight:1.75,
                  fontFamily:"monospace",color:C.text,maxHeight:360,overflowY:"auto",
                  background:"#FDFAF6"}}>
                  {aiMsg[method]}
                </div>
              </div>
            )}
          </Card>
        )}

        {method==="REBA"&&<REBAPanel s={reba} set={setReba}/>}
        {method==="RULA"&&<RULAPanel s={rula} set={setRula}/>}
        {method==="OWAS"&&<OWASPanel s={owas} set={setOwas}/>}
        {method==="NIOSH"&&<NIOSHPanel s={niosh} set={setNiosh}/>}
        {method==="MMC"&&<MMCPanel s={mmc} set={setMmc} sexo={info.sexo}/>}
        {!method&&(
          <div style={{textAlign:"center",padding:50,color:C.muted,background:"white",
            borderRadius:14,border:`2px dashed ${C.cb}`}}>
            <div style={{fontSize:32,marginBottom:10}}>👆</div>
            <div style={{fontWeight:700,fontSize:15,color:C.mid}}>Selecciona un método arriba</div>
          </div>
        )}
        <Nav onBack={()=>setStep(1)} onNext={()=>setStep(3)} nextLabel="Ver Resultados →"/>
      </div>
    );
  }

  // STEP 3
  const res=getRes();
  if(step===3)return wrap(
    <Card title="📊 Resumen de Riesgo Ergonómico">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {Object.entries(res).map(([m,r])=>(
          <div key={m} style={{background:C.bg,border:`2px solid ${C.r[r.level]}44`,
            borderRadius:12,padding:16}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:8,color:C.orange}}>{m}</div>
            {m==="REBA"&&<><Badge level={r.level} text={`Score ${r.fin}/15`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>A:{r.sA} B:{r.sB} C:{r.sC}</div></>}
            {m==="RULA"&&<><Badge level={r.level} text={`Score ${r.fin}`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>A:{r.sA} B:{r.sB}</div></>}
            {m==="OWAS"&&<><Badge level={r.level} text={`Cat.${r.cat}·${r.code}`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>{r.action}</div></>}
            {m==="NIOSH"&&<><Badge level={r.level} text={`LI=${r.LI}`}/><div style={{fontSize:11,color:C.muted,marginTop:4}}>RWL={r.RWL}kg</div></>}
            {m==="MMC"&&<>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                <span style={{background:r.cumRM?"#dcfce7":"#fee2e2",color:r.cumRM?"#166534":"#991b1b",
                  padding:"2px 8px",borderRadius:20,fontWeight:700,fontSize:11}}>
                  RM375:{r.cumRM?"✓":"✗"} {r.limRM}kg
                </span>
                <span style={{background:r.cumISO?"#dcfce7":"#fee2e2",color:r.cumISO?"#166534":"#991b1b",
                  padding:"2px 8px",borderRadius:20,fontWeight:700,fontSize:11}}>
                  ISO:{r.cumISO?"✓":"✗"} {r.limISO}kg
                </span>
              </div>
              <Badge level={r.level} text={`${mmc.peso}kg · Lím:${r.limAp}kg`}/>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>
                {+r.exc>0?`Excede ${r.exc}kg`:"Dentro del límite"} · {r.nF} factores

        <div style={{marginBottom:20}}>
          <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
            borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>Recomendaciones Ergonómicas</div>
          <div style={{marginBottom:10}}>
            <div style={{fontWeight:700,marginBottom:6,color:C.mid}}>6.1 Medidas de Ingeniería (Inmediatas)</div>
            <ul style={{paddingLeft:20,fontSize:12,lineHeight:1.8}}>
              <li>Instalar mesa o plataforma elevada (70-90 cm) para eliminar levantamientos desde el suelo.</li>
              <li>Implementar carretilla o transpaleta para cargas superiores a {ri.MMC?ri.MMC.limAp:25} kg.</li>
              <li>Reorganizar acopio: altura entre rodillas y hombros del operador (60-130 cm).</li>
              {ri.REBA&&reba.coup>=2&&<li>Instalar asideros o mecanismos de agarre para mejorar tipo de agarre y reducir desviación de muñeca.</li>}
            </ul>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontWeight:700,marginBottom:6,color:C.mid}}>6.2 Medidas Administrativas</div>
            <ul style={{paddingLeft:20,fontSize:12,lineHeight:1.8}}>
              <li>Capacitación en técnica correcta de levantamiento: rodillas flexionadas, carga pegada al cuerpo, espalda neutra, sin torsión.</li>
              <li>Límite individual: máximo {ri.MMC?ri.MMC.limAp:25} kg. Para cargas mayores, trabajo en equipo de 2 personas obligatorio.</li>
              <li>Rotación de tareas: máximo 30 minutos continuos de manipulación manual de cargas.</li>
              <li>Pausas activas de 5 minutos cada hora con ejercicios de estiramiento lumbar y hombros.</li>
            </ul>
          </div>
          <div>
            <div style={{fontWeight:700,marginBottom:6,color:C.mid}}>6.3 Vigilancia Médica Ocupacional</div>
            <ul style={{paddingLeft:20,fontSize:12,lineHeight:1.8}}>
              <li>Evaluación musculoesquelética de columna lumbar (L4-L5, L5-S1), hombros y muñecas.</li>
              <li>Aplicación del Cuestionario Nórdico Musculoesquelético (NMQ) y CMDQ para detección temprana.</li>
              <li>Re-evaluación ergonómica en 90 días post-implementación de medidas correctivas.</li>
              {mmc.form==="no"&&<li>Capacitación inmediata en MMC — agravante activo según RM 375-2008-TR Art. 6.</li>}
            </ul>
          </div>
        </div>

        {/* Conclusiones */}
        <div style={{marginBottom:24}}>
          <div style={{fontWeight:700,color:C.orange,fontSize:14,marginBottom:10,
            borderBottom:`2px solid ${C.orange}`,paddingBottom:4}}>Conclusiones</div>
          <ol style={{paddingLeft:20,fontSize:12,lineHeight:2}}>
            {ri.REBA&&<li>La evaluación REBA evidencia riesgo ergonómico <strong>{RL[ri.REBA.level]} (puntuación {ri.REBA.fin}/15)</strong> en el puesto de {info.cargo||"trabajo evaluado"}.</li>}
            {ri.MMC&&mmc.peso>0&&<li>Respecto a la <strong>RM 375-2008-TR</strong>: el peso de {mmc.peso}kg {ri.MMC.cumRM?"cumple":"incumple"} el límite general ({ri.MMC.limRM}kg para {info.sexo==="masculino"?"varón":"mujer"}). Respecto a <strong>ISO 11228-1</strong>: {ri.MMC.cumISO?"cumple":"incumple"} el límite por frecuencia ({ri.MMC.limISO}kg, exposición {mmc.frec}).</li>}
            {ri.NIOSH&&<li>Ecuación NIOSH: LI = <strong>{ri.NIOSH.LI}</strong> · RWL = {ri.NIOSH.RWL}kg — Riesgo {RL[ri.NIOSH.level]}.</li>}
            {ri.RULA&&<li>RULA: Score {ri.RULA.fin} — Riesgo {RL[ri.RULA.level]}.</li>}
            {ri.OWAS&&<li>OWAS: Código {ri.OWAS.code} — Categoría {ri.OWAS.cat} — {ri.OWAS.action}.</li>}
            <li>Se requiere intervención ergonómica {ri.REBA&&ri.REBA.level>=3?"inmediata":"a corto plazo"}, priorizando controles de ingeniería.</li>
          </ol>
        </div>

        {/* Firma */}
        <div style={{borderTop:`2px solid ${C.cb}`,paddingTop:20,
          display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div style={{fontSize:11,color:C.muted}}>
            <div>Generado con PANACEA ERGO</div>
            <div>Normativa: RM 375-2008-TR · ISO 11228-1</div>
            <div>Documento confidencial — uso médico ocupacional</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{borderTop:`1px solid ${C.text}`,paddingTop:8,width:260}}>
              <div style={{fontWeight:800,fontSize:14}}>{info.evaluador}</div>
              <div style={{fontSize:11,color:C.muted}}>Médico Especialista en Medicina Ocupacional</div>
              <div style={{fontSize:11,color:C.muted}}>y del Medio Ambiente — UPCH</div>
              <div style={{fontSize:11,color:C.orange,fontWeight:600}}>CMP 102517 · RNE/RNA 13334</div>
              <div style={{fontSize:11,color:C.muted}}>Panacea Medicina Ocupacional · Arequipa, {info.fecha}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
