// ── CÁLCULOS REBA ─────────────────────────────────────────────────────────
const REBA_TA = [[1,2,3,4],[1,2,3,4],[3,3,5,6],[4,4,6,7],[4,4,6,7],[6,6,7,8]];
const REBA_TB = [[1,2,2,3,4,5],[2,2,2,3,4,5],[3,3,3,4,5,6],[3,3,3,4,5,6],
                 [4,4,4,5,6,7],[4,4,5,6,7,7],[5,5,6,7,8,8],[5,5,6,7,8,8]];
const REBA_TC = [
  [1,1,1,2,3,3,4,5,6,7,7,7],[1,2,2,3,4,4,5,6,6,7,7,8],[2,3,3,3,4,5,6,7,7,8,8,8],
  [3,4,4,4,5,6,7,8,8,9,9,9],[4,4,4,5,6,7,8,8,9,9,9,9],[6,6,6,7,8,8,9,9,10,10,10,10],
  [7,7,7,8,9,9,9,10,10,11,11,11],[8,8,8,9,10,10,10,10,10,11,11,11],
  [9,9,9,10,10,10,11,11,11,12,12,12],[10,10,10,11,11,11,11,12,12,12,12,12],

];

function calcReba(s) {
  const neck  = s.neck  + (s.neckT?1:0)  + (s.neckS?1:0);
  const trunk = s.trunk + (s.trunkT?1:0) + (s.trunkS?1:0);
  const rA = Math.min(Math.max((trunk-1)*2 + Math.min(neck-1,2), 0), 5);
  const sA = Math.min((REBA_TA[rA]?.[Math.min(s.legs-1,3)] ?? 6) + s.load + (s.shock?1:0), 12);
  const ua  = Math.max(s.ua + (s.shr?1:0) + (s.abd?1:0) - (s.sup?1:0), 1);
  const rB  = Math.min((ua-1)*2 + Math.min(s.la-1,1), 7);
  const cB  = Math.min((s.wrist-1)*2 + (s.wristT?1:0), 5);
  const sB  = Math.min((REBA_TB[rB]?.[cB] ?? 6) + s.coup, 12);
  const sC  = REBA_TC[Math.min(sA-1,11)]?.[Math.min(sB-1,11)] ?? 12;
  const fin = Math.min(sC + s.act, 12);
  const level = fin<=1?0 : fin<=3?1 : fin<=7?2 : fin<=10?3 : 4;
  return {sA, sB, sC, fin, level};
}

// ── CÁLCULO NIOSH ─────────────────────────────────────────────────────────
const NIOSH_FM = {
  "<1h": [0.85,0.81,0.75,0.65,0.55,0.45,0,0,0,0,0,0,0],
  "1-2h":[0.95,0.92,0.88,0.84,0.79,0.72,0.6,0.5,0.42,0.35,0.3,0.26,0.23],
  "2-8h":[1,0.97,0.94,0.91,0.88,0.84,0.8,0.75,0.7,0.6,0.52,0.45,0]
};

function calcNiosh(s) {
  const HM = Math.min(25 / Math.max(s.H, 1), 1);
  const VM = Math.max(1 - 0.003 * Math.abs(s.V - 75), 0);
  const DM = s.D < 25 ? 0.87 : Math.min(0.82 + 4.5/s.D, 1);
  const AM = Math.max(1 - 0.0032 * s.A, 0);
  const fi = s.F<=0.2?0:s.F<=0.5?1:s.F<=1?2:s.F<=2?3:s.F<=3?4:
             s.F<=4?5:s.F<=5?6:s.F<=6?7:s.F<=7?8:s.F<=8?9:s.F<=9?10:s.F<=10?11:12;
  const FM = NIOSH_FM[s.dur]?.[fi] ?? 0.45;
  const CM = s.coup==="good" ? 1 : s.coup==="fair" ? 0.95 : 0.90;
  const RWL = 23 * HM * VM * DM * AM * FM * CM;
  const LI  = s.L / Math.max(RWL, 0.01);
  const level = LI<=1?0 : LI<=2?1 : LI<=3?2 : LI<=5?3 : 4;
  return {HM, VM, DM, AM, FM, CM, RWL:RWL.toFixed(2), LI:LI.toFixed(2), level};
}

// ── CÁLCULO RULA ──────────────────────────────────────────────────────────
function calcRula(s) {
  const tA = [
    [[[1,2],[2,2],[2,3],[3,3]],[[2,2],[2,2],[3,3],[3,3]],[[2,3],[3,3],[3,3],[4,4]]],
    [[[2,3],[3,3],[3,4],[4,4]],[[3,3],[3,3],[3,4],[4,4]],[[3,4],[4,4],[4,4],[5,5]]],
    [[[3,3],[4,4],[4,4],[5,5]],[[3,4],[4,4],[4,5],[5,5]],[[4,4],[4,4],[4,5],[5,6]]],
    [[[4,4],[4,4],[4,5],[5,5]],[[4,4],[4,4],[4,5],[5,5]],[[4,5],[5,5],[5,6],[6,7]]],
    [[[5,5],[5,5],[5,6],[6,7]],[[5,6],[6,6],[6,7],[7,7]],[[6,6],[6,7],[7,7],[7,8]]],
    [[[7,8],[7,8],[7,8],[8,9]],[[8,9],[8,9],[8,9],[9,9]],[[9,9],[9,9],[9,9],[9,9]]]
  ];
  const ua  = Math.max(Math.min(s.ua + (s.shr?1:0) - (s.sup?1:0), 6), 1);
  const la  = Math.min(s.la + (s.mid?1:0), 2);
  const w   = Math.min(s.wrist, 3);
  const wt  = s.wristT ? 1 : 0;
  const sA  = (tA[ua-1]?.[la-1]?.[w-1]?.[wt] ?? 9) + s.mA + s.fA;
  const tB  = [
    [1,3,2,3,3,4,5,5,6,6,7,7],[2,3,2,3,4,5,5,6,6,7,7,7],
    [3,4,3,4,4,5,6,6,7,7,7,7],[5,5,4,5,5,6,7,7,7,7,8,8],
    [7,7,5,6,6,7,7,8,8,8,8,8],[8,8,7,7,7,8,8,9,9,9,9,9]
  ];
  const n   = Math.min(s.neck  + (s.neckT?1:0)  + (s.neckS?1:0),  6);
  const t   = Math.min(s.trunk + (s.trunkT?1:0) + (s.trunkS?1:0), 6);
  const lg  = Math.min(s.legs, 2);
  const sB  = (tB[n-1]?.[t + (lg-1)*6 - 1] ?? 9) + s.mB + s.fB;
  const tC  = [
    [1,2,3,3,4,5,5],[2,2,3,4,4,5,5],[3,3,3,4,4,5,6],[3,3,3,4,5,6,6],
    [4,4,4,5,6,7,7],[4,4,5,6,6,7,7],[5,5,6,6,7,7,7],[5,5,6,7,7,7,7]
  ];
  const fin = tC[Math.min(sA-1,7)]?.[Math.min(sB-1,6)] ?? 7;
  const level = fin<=2?0 : fin<=3?1 : fin<=4?2 : fin<=6?3 : 4;
  return {sA, sB, fin, level};
}

// ── CÁLCULO MMC ───────────────────────────────────────────────────────────
// Norma base: RM 375-2008-TR por sexo
// ISO 11228 mostrado como referencia complementaria
function calcMMC(s, sexo) {
  const sx  = sexo === "femenino" ? "femenino" : "masculino";
  const rm  = NORMA.rm375[sx];
  const row = NORMA.iso.find(x => x.g === s.grupo)
           || (sx === "masculino" ? NORMA.iso[0] : NORMA.iso[3]);
  const isoLim = s.frec==="ocasional" ? row.o : s.frec==="frecuente" ? row.f : row.mf;
  // RM 375 es el límite aplicable (norma peruana base)
  const limAp = rm.general;
  const exc   = Math.max(s.peso - limAp, 0);
  const pct   = limAp > 0 ? ((s.peso / limAp - 1) * 100) : 0;
  let level   = s.peso<=limAp?0 : s.peso<=limAp*1.2?1 : s.peso<=limAp*1.5?2 : s.peso<=limAp*2?3 : 4;
  const nF    = (s.factores||[]).length;
  if (nF >= 3 && level < 2) level = 2;
  if (nF >= 5 && level < 3) level = 3;
  return {
    limRM: rm.general, limEnt: rm.entrenado, limISO: isoLim, limAp,
    exc: exc.toFixed(1), pct: pct.toFixed(0), nF, level,
    cumRM:  s.peso <= rm.general,
    cumISO: s.peso <= isoLim
  };
}

// ── PARSER IA → FORMULARIO ────────────────────────────────────────────────
// Lee el texto estructurado del Worker y extrae valores para el panel de revisión
function parseIA(txt, m) {
  // Extrae número entre corchetes en una línea que contenga el patrón
  const num = (pat, maxVal) => {
    const line = txt.split("\n").find(l => pat.test(l));
    if (!line) return null;
    const m = line.match(/\[(\d)\]/);
    if (!m) return null;
    const v = parseInt(m[1]);
    return maxVal ? Math.min(v, maxVal) : v;
  };
  // Extrae sí/no de una línea que contenga el patrón
  const bool = pat => {
    const line = txt.split("\n").find(l => pat.test(l));
    if (!line) return null;
    if (/sí|si/i.test(line)) return true;
    if (/\bno\b/i.test(line)) return false;
    return null;
  };

  const vals = {};

  if (m === "REBA") {
    const neck  = num(/CUELLO/i,    2); if (neck  !== null) vals.neck  = neck;
    const trunk = num(/TRONCO/i,    4); if (trunk !== null) vals.trunk = trunk;
    const legs  = num(/PIERNAS/i,   4); if (legs  !== null) vals.legs  = legs;
    const ua    = num(/BRAZO SUPERIOR/i, 4); if (ua !== null) vals.ua = ua;
    const la    = num(/BRAZO INFERIOR/i, 2); if (la !== null) vals.la = la;
    const wrist = num(/MUÑECA|MU.ECA/i, 2); if (wrist !== null) vals.wrist = wrist;
    const coup  = num(/ACOPLAMIENTO/i, 3); if (coup !== null) vals.coup = coup;
    const act   = num(/ACTIVIDAD/i,  3); if (act  !== null) vals.act  = act;
    // Carga: busca kg en línea CARGA o extrae score
    const cargaLine = txt.split("\n").find(l => /^CARGA/i.test(l.trim()));
    if (cargaLine) {
      const kgM = cargaLine.match(/(\d+(?:\.\d+)?)\s*kg/i);
      if (kgM) { const kg = parseFloat(kgM[1]); vals.load = kg<5?0:kg<=10?1:2; }
      else { const sc = cargaLine.match(/\[([0-2])\]/); if (sc) vals.load = parseInt(sc[1]); }
    }
    const neckT  = bool(/Torsión.*cuello|cuello.*torsión/i);   if (neckT  !== null) vals.neckT  = neckT;
    const neckS  = bool(/Inclinación.*cuello|cuello.*inclin/i); if (neckS  !== null) vals.neckS  = neckS;
    const trunkT = bool(/Torsión.*tronco|tronco.*torsión/i);   if (trunkT !== null) vals.trunkT = trunkT;
    const trunkS = bool(/Inclinación.*tronco|tronco.*inclin/i); if (trunkS !== null) vals.trunkS = trunkS;
    const shr    = bool(/Hombro elevado/i);  if (shr    !== null) vals.shr    = shr;
    const abd    = bool(/Abducci/i);         if (abd    !== null) vals.abd    = abd;
    const wristT = bool(/Torsión.*mu.eca|mu.eca.*torsión/i); if (wristT !== null) vals.wristT = wristT;
    const shock  = bool(/Shock|fuerza brusca/i); if (shock !== null) vals.shock = shock;

  } else if (m === "RULA") {
    const ua    = num(/BRAZO SUPERIOR/i, 4); if (ua    !== null) vals.ua    = ua;
    const la    = num(/BRAZO INFERIOR/i, 2); if (la    !== null) vals.la    = la;
    const wrist = num(/MUÑECA|MU.ECA/i, 3); if (wrist !== null) vals.wrist = wrist;
    const neck  = num(/CUELLO/i,  4);        if (neck  !== null) vals.neck  = neck;
    const trunk = num(/TRONCO/i,  4);        if (trunk !== null) vals.trunk = trunk;
    const mA    = num(/Músculo A|Musculo A/i, 1); if (mA !== null) vals.mA = mA;
    const fA    = num(/Fuerza A/i, 3);       if (fA    !== null) vals.fA   = fA;
    const mB    = num(/Músculo B|Musculo B/i, 1); if (mB !== null) vals.mB = mB;
    const fB    = num(/Fuerza B/i, 3);       if (fB    !== null) vals.fB   = fB;
    const shr    = bool(/Hombro elevado/i);            if (shr    !== null) vals.shr    = shr;
    const wristT = bool(/Torsión.*mu.eca|mu.eca.*tor/i); if (wristT !== null) vals.wristT = wristT;
    const neckT  = bool(/Torsión.*cuello/i);   if (neckT  !== null) vals.neckT  = neckT;
    const trunkT = bool(/Torsión.*tronco/i);   if (trunkT !== null) vals.trunkT = trunkT;
    const neckS  = bool(/Inclinación.*cuello/i); if (neckS !== null) vals.neckS = neckS;
    const trunkS = bool(/Inclinación.*tronco/i); if (trunkS!== null) vals.trunkS= trunkS;

  } else if (m === "OWAS") {
    // Intenta leer código directo primero: ej "Código: 4232" o "[4][2][3][2]"
    const codeM = txt.match(/[Cc][oó]digo[^\d]*(\d)(\d)(\d)(\d)/);
    if (codeM) {
      vals.back = parseInt(codeM[1]);
      vals.arms = parseInt(codeM[2]);
      vals.legs = parseInt(codeM[3]);
      vals.load = parseInt(codeM[4]);
    } else {
      const bk = num(/ESPALDA/i, 4); if (bk !== null) vals.back = bk;
      const ar = num(/BRAZOS/i,  3); if (ar !== null) vals.arms = ar;
      const lg = num(/PIERNAS/i, 7); if (lg !== null) vals.legs = lg;
      const ld = num(/CARGA/i,   3); if (ld !== null) vals.load = ld;
    }

  } else if (m === "NIOSH") {
    // Busca patrón "H (distancia horizontal): 45 cm"
    const H = txt.match(/\bH\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*cm/i);
    const V = txt.match(/\bV\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*cm/i);
    const D = txt.match(/\bD\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*cm/i);
    const A = txt.match(/\bA\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*°/i);
    const F = txt.match(/\bF\b[^:\n]*:\s*\[?(\d+(?:\.\d+)?)\]?\s*(?:lev|\/min)/i);
    if (H) vals.H = parseFloat(H[1]);
    if (V) vals.V = parseFloat(V[1]);
    if (D) vals.D = parseFloat(D[1]);
    if (A) vals.A = parseFloat(A[1]);
    if (F) vals.F = parseFloat(F[1]);
    const coupLine = txt.match(/Acoplamiento[^:\n]*:\s*(bueno|regular|pobre)/i);
    if (coupLine) {
      const cv = coupLine[1].toLowerCase();
      vals.coup = cv==="bueno"?"good" : cv==="regular"?"fair" : "poor";
    }
  }

  return Object.keys(vals).length > 0 ? vals : null;
}

// ── PROPAGACIÓN: SOLO REBA → MMC (factores de riesgo, no valores posturales) ──
// Cada método ergonómico se evalúa de forma independiente.
// La única propagación válida es de REBA hacia MMC, porque comparten
// los mismos factores de riesgo observados (torsión, agarre, frecuencia).
function extractMMCFactors(vals, sourceMethod, texto) {
  // Solo propaga desde REBA
  if (sourceMethod !== "REBA") return [];
  const f = [];
  const add = id => { if (!f.includes(id)) f.push(id); };
  // Torsión de tronco → factor de asimetría MMC
  if (vals.trunkT === true) add("asim");
  // Acoplamiento malo/inaceptable → agarre deficiente
  if (vals.coup !== undefined && vals.coup >= 2) add("agr");
  // Actividad repetitiva → alta frecuencia
  if (vals.act  !== undefined && vals.act  >= 2) add("freq");
  // Piernas en cuclillas/rodillas → postura desfavorable (altura)
  if (vals.legs !== undefined && vals.legs >= 3) add("alt");
  // Desde texto libre de valoración clínica IA
  if (texto) {
    if (/superficie.*inestable/i.test(texto))              add("sue");
    if (/carga.*inestable/i.test(texto))                   add("ines");
    if (/sin.*carretilla|sin.*ayuda.*mec/i.test(texto))    add("eq");
    if (/espacio.*restringido/i.test(texto))               add("esp");
    if (/encima.*hombro|bajo.*rodilla|nivel del suelo/i.test(texto)) add("alt");
  }
  return f;
}

          {/* Banner valores aplicados */}
          {filled && !reviewData && (

      {/* Panel del método seleccionado */}

      {!method && (

  // ── STEP 3: RESULTADOS ───────────────────────────────────────────────────
  const res = getRes();
  if (step===3) return wrap(
    <Card title="📊 Resumen de Riesgo Ergonómico">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

  // ── STEP 4: INFORME ──────────────────────────────────────────────────────
  const ri      = getRes();

          // Hallazgos clínicos descriptivos generados desde los valores seleccionados

            : `Flexión anterior >60°, sin soporte${reba.trunkT?", con torsión lateral":""} — postura de alto riesgo lumbar`;
          const descCuello = reba.neck===1 ? "Flexión cervical 0-20°, posición funcional"
            : "Flexión cervical >20° — cabeza dirigida hacia la carga, tensión suboccipital aumentada";
          const descPiernas = reba.legs===1 ? "Soporte bilateral estable, base de sustentación amplia"
            : reba.legs===2 ? "Apoyo unilateral o en movimiento"
            : reba.legs===3 ? "Flexión bilateral de rodillas 30-60° (semisquatting) — sobrecarga patelofemoral"

          const descCarga = reba.load===0 ? "<5 kg — carga leve"
            : reba.load===1 ? "5-10 kg — carga moderada"

            : `Desviación en flexión/extensión >15°${reba.wristT?" con torsión":""} — riesgo síndrome túnel carpiano`;

                  {[
                    ["Tronco",      descTronco,  reba.trunk, ["Erecto","0-20°","20-60°",">60°"][reba.trunk-1]],
                    ["Cuello",      descCuello,  reba.neck,  ["0-20°",">20°"][reba.neck-1]],
                    ["Piernas",     descPiernas, reba.legs,  `Nivel ${reba.legs}`],
                    ["Carga/Fuerza",descCarga,   `+${reba.load}${reba.shock?"+1":""}`,

                      <td style={{padding:"6px 10px",textAlign:"center",fontWeight:700,color:C.orange}}>{niv}</td>

              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:12}}>
                <thead><tr style={{background:C.orange,color:"white"}}>
                  <th style={{padding:"6px 10px",textAlign:"left"}}>Segmento</th>
                  <th style={{padding:"6px 10px",textAlign:"left"}}>Hallazgo observado</th>
                  <th style={{padding:"6px 10px",textAlign:"center"}}>Nivel</th>
                  <th style={{padding:"6px 10px",textAlign:"left"}}>Criterio REBA</th>
